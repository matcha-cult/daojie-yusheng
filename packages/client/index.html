        background: rgba(3, 4, 6, 0.46);
        padding: 6px;
      }
      .map-minimap-modal-window {
        left: 6px;
        top: 6px;
        transform: none;
        width: calc(100vw - 12px);
        height: calc(100dvh - 12px);
        max-width: none;
        max-height: none;
        border-radius: 14px;
      }
      .map-minimap-modal-header {
        padding: 10px;
      }
      .map-minimap-modal-body {
        display: block;
        padding: 8px;
      }
      .map-minimap-modal-catalog-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .map-minimap-modal-sidebar {
        position: absolute;
        left: 8px;
        right: 8px;
        top: 8px;
        z-index: 3;
        max-height: min(42vh, 320px);
        padding: 10px;
        border: 1px solid rgba(236, 222, 192, 0.24);
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(20, 18, 16, 0.96), rgba(10, 10, 12, 0.96));
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(6px);
        gap: 8px;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      .map-minimap-modal[data-mobile-catalog-open="false"] .map-minimap-modal-sidebar {
        opacity: 0;
        transform: translateY(-10px);
        pointer-events: none;
      }
      .map-minimap-modal[data-mobile-catalog-open="true"] .map-minimap-modal-sidebar {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .map-minimap-modal-toolbar {
        justify-content: stretch;
      }
      .map-minimap-modal-toolbar > * {
        flex: 1 1 auto;
      }
      .map-minimap-modal-list {
        max-height: min(28vh, 180px);
        padding-right: 0;
      }
      .map-minimap-modal-stage {
        min-height: 0;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      .map-minimap-modal-canvas {
        touch-action: none;
      }
      #game-stage {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        min-height: 0;
      }
      .map-tool-controls {
        flex-direction: column;
        gap: clamp(6px, 2vw, 10px);
        padding: clamp(8px, 2.2vw, 10px) clamp(4px, 1.2vw, 6px);
        border-radius: 14px;
        transform: scale(clamp(0.68, 0.82 + 0.2vw, 0.92));
        transform-origin: center top;
      }
      .map-zoom-slider {
        writing-mode: vertical-lr;
        direction: rtl;
        inline-size: clamp(84px, 16vh, 118px);
        block-size: clamp(12px, 3vw, 16px);
        cursor: ns-resize;
      }
      .map-side-tool-top {
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        align-self: stretch;
        gap: clamp(8px, 2vw, 12px);
        padding-top: 0;
      }
      .map-side-tool-center {
        flex: 1 1 auto;
        width: 100%;
      }
      .map-side-info-stack {
        flex-direction: column;
        justify-content: space-between;
        align-self: stretch;
        flex: 1 1 auto;
        gap: clamp(10px, 2.4vw, 14px);
        padding: 0;
      }
      .split-tab-btn {
        border-bottom: none;
        border-right: 1px solid var(--wash-ink);
        padding: 8px 12px;
      }
      .split-tab-btn:last-child {
        border-right: none;
      }
      .split-tab-btn.active {
        box-shadow: inset 0 -2px 0 var(--stamp-red);
      }
      #layout-center {
        order: 1;
      }
      #layout-left {
        order: 2;
      }
      #layout-right {
        order: 3;
      }
      .layout-section {
        min-height: 260px;
      }
      .map-section {
        min-height: 420px;
      }
      #debug-panel {
        right: 10px;
        bottom: 10px;
        width: min(260px, calc(100vw - 20px));
      }
    }
  </style>
</head>
<body>
  <!-- 登录 -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-stamp">入</div>
      <img class="login-logo" src="/logo.png" alt="道劫余生" />
      <h1 class="login-title">道劫余生</h1>
      <p class="login-subtitle">道劫余生</p>
      <div class="login-mode-tabs" role="tablist" aria-label="登录模式切换">
        <button class="login-mode-tab active" id="tab-login" type="button" role="tab" aria-selected="true">登录</button>
        <button class="login-mode-tab" id="tab-register" type="button" role="tab" aria-selected="false">注册</button>
      </div>
      <div class="form-group">
        <label id="username-label">账号</label>
        <input id="input-username" type="text" placeholder="输入账号" />
      </div>
      <div class="form-group">
        <label>口令</label>
        <input id="input-password" type="password" placeholder="输入密码" />
      </div>
      <div class="form-group hidden" id="register-display-name-group">
        <label>显示名</label>
        <input id="input-display-name" type="text" maxlength="1" placeholder="注册时必填，仅 1 个字" />
        <div class="form-help">注册时必须选择 1 个唯一显示字。未设置的旧账号默认取账号首字。</div>
        <div class="field-status" id="display-name-status">注册时必填</div>
      </div>
      <div class="login-actions">
        <button class="action-btn primary-btn" id="btn-auth-submit">
          <span class="btn-text" id="auth-submit-text">登录</span>
          <span class="btn-border"></span>
        </button>
      </div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <div id="game-shell" class="hidden">
    <aside id="layout-left" class="layout-column">
      <section class="layout-section">
        <div id="hud" class="hidden">
          <div class="hud-panel">
            <div class="hud-identity">
              <div class="hud-name" id="hud-name">修行者</div>
              <div class="hud-title" id="hud-title">无号散修</div>
            </div>
            <div class="hud-top-row">
              <div class="hud-realm-block">
                <div class="hud-realm-label">境界</div>
                <button class="hud-realm-action" id="hud-breakthrough" type="button" hidden>突破</button>
                <div class="hud-realm-main">
                  <div class="hud-realm-value" id="hud-realm">-</div>
                  <div class="hud-realm-sub" id="hud-realm-sub">-</div>
                </div>
                <div class="hud-progress-shell">
                  <div class="hud-progress-value" id="hud-cultivate">修为 (0/0)</div>
                  <div class="hud-progress-track">
                    <div class="hud-progress-fill" id="hud-cultivate-bar"></div>
                  </div>
                </div>
              </div>
              <div class="hud-top-spacer"></div>
            </div>
            <div class="hud-resource-bars">
              <div class="hud-resource-bar">
                <div class="hud-resource-head">
                  <div class="hud-resource-label">生命值</div>
                  <div class="hud-resource-text" id="hud-hp-text">0/0</div>
                </div>
                <div class="hud-resource-meter">
                  <div class="hud-resource-fill" id="hud-hp-bar"></div>
                </div>
              </div>
              <div class="hud-resource-bar">
                <div class="hud-resource-head">
                  <div class="hud-resource-label">灵力</div>
                  <div class="hud-resource-text" id="hud-qi-text">0/0</div>
                </div>
                <div class="hud-resource-meter hud-resource-meter--qi">
                  <div class="hud-resource-fill" id="hud-qi-bar"></div>
                </div>
              </div>
            </div>
            <div class="hud-grid">
              <div class="hud-row">
                <span class="hud-label">地图</span>
                <span class="hud-value" id="hud-map">-</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">位置</span>
                <span class="hud-value" id="hud-pos">(0, 0)</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">当前目标</span>
                <span class="hud-value" id="hud-objective">暂无</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">威胁</span>
                <span class="hud-value" id="hud-threat">平稳</span>
              </div>
            </div>
            <div class="hud-corner-actions">
              <button id="hud-open-settings" class="hud-corner-btn" type="button">设置</button>
              <button id="hud-open-suggestions" class="hud-corner-btn" type="button">意见</button>
              <button id="hud-open-chronicle" class="hud-corner-btn" type="button">史书</button>
              <button id="hud-logout" class="hud-corner-btn danger" type="button">登出</button>
            </div>
          </div>
        </div>
      </section>

      <section class="layout-section">
        <div class="section-shell" data-tab-group="left-lower">
          <div class="section-header">
            <div>
              <div class="section-title">修行卷</div>
              <div class="section-subtitle">属性总览</div>
            </div>
          </div>
          <div class="section-body">
            <div class="tab-pane active" id="pane-attr"></div>
          </div>
        </div>
      </section>
      <button
        id="layout-toggle-left"
        class="layout-collapse-toggle"
        data-layout-toggle="left"
        data-layout-axis="horizontal"
        type="button"
        aria-label="收起左侧区域"
        aria-expanded="true"
        title="收起左侧区域"
      >&lt;</button>
    </aside>

    <main id="layout-center" class="layout-column">
      <section class="layout-section map-section">
        <div class="map-shell">
          <div class="map-side-rail left">
            <div class="map-side-tool-top">
              <div id="map-ping-rate" class="map-tick-rate" title="通过当前访问域名检测游戏服务器延迟">
                <span class="map-tick-rate-char">灵</span>
                <span class="map-tick-rate-char">网</span>
                <span class="map-tick-rate-char">延</span>
                <span class="map-tick-rate-char">迟</span>
                <span class="map-tick-rate-value" id="map-ping-value">
                  <span class="map-tick-rate-number" data-ping-part="hundreds">-</span>
                  <span class="map-tick-rate-number" data-ping-part="tens">-</span>
                  <span class="map-tick-rate-number" data-ping-part="ones">-</span>
                </span>
                <span class="map-side-phase" id="map-ping-unit">待测</span>
              </div>
            </div>
            <div class="map-side-tool-center">
              <div class="map-tool-controls">
                <div id="zoom-level" class="map-zoom-value"><span>x</span><span>1</span></div>
                <input
                  id="zoom-slider"
                  class="map-zoom-slider"
                  type="range"
                  min="0.5"
                  max="4"
                  step="0.01"
                  value="2"
                  aria-label="地图缩放"
                />
              </div>
            </div>
          </div>
        <div id="game-stage">
            <div id="map-targeting-indicator" class="map-targeting-indicator hidden"></div>
            <div id="map-minimap-shell" class="map-minimap-shell hidden">
              <div class="map-minimap-controls">
                <button id="map-minimap-toggle" class="map-minimap-btn" type="button" title="隐藏小地图">隐</button>
                <button id="map-minimap-open" class="map-minimap-btn" type="button" title="展开大地图">展</button>
              </div>
              <div id="map-minimap" class="map-minimap hidden">
                <div class="map-minimap-frame">
                  <div id="map-minimap-title" class="map-minimap-title">舆图</div>
                  <canvas id="map-minimap-canvas" class="map-minimap-canvas"></canvas>
                </div>
              </div>
            </div>
            <div id="map-minimap-modal" class="map-minimap-modal hidden" aria-hidden="true">
              <div id="map-minimap-modal-window" class="map-minimap-modal-window">
                <div id="map-minimap-modal-header" class="map-minimap-modal-header">
                  <div id="map-minimap-modal-title" class="map-minimap-modal-title">舆图</div>
                  <div class="map-minimap-modal-actions">
                    <button id="map-minimap-modal-catalog-toggle" class="map-minimap-modal-catalog-toggle" type="button" aria-expanded="false">目录</button>
                    <button id="map-minimap-modal-close" class="map-minimap-modal-close" type="button">关</button>
                  </div>
                </div>
                <div class="map-minimap-modal-body">
                  <aside class="map-minimap-modal-sidebar">
                    <div class="map-minimap-modal-filters">
                      <button id="map-minimap-filter-all" class="map-minimap-modal-filter active" type="button">全部</button>
                      <button id="map-minimap-filter-memory" class="map-minimap-modal-filter" type="button">记忆</button>
                      <button id="map-minimap-filter-unlock" class="map-minimap-modal-filter" type="button">解锁</button>
                    </div>
                    <div class="map-minimap-modal-toolbar">
                      <button id="map-minimap-delete-memory" class="small-btn ghost" type="button">删除记忆</button>
                    </div>
                    <div id="map-minimap-modal-list" class="map-minimap-modal-list"></div>
                  </aside>
                  <div class="map-minimap-modal-stage">
                    <canvas id="map-minimap-modal-canvas" class="map-minimap-modal-canvas"></canvas>
                  </div>
                </div>
              </div>
            </div>
            <canvas id="game-canvas"></canvas>
          </div>
        <div class="map-side-rail right">
          <div class="map-side-info-stack">
            <div id="map-current-time" class="map-tick-rate">
              <span class="map-tick-rate-char">当</span>
              <span class="map-tick-rate-char">前</span>
              <span class="map-tick-rate-char">时</span>
              <span class="map-tick-rate-char">间</span>
              <span class="map-tick-rate-value" id="map-current-time-value">
                <span class="map-tick-rate-number" data-time-part="hour-a">-</span>
                <span class="map-tick-rate-number" data-time-part="hour-b">-</span>
                <span class="map-tick-rate-number" data-time-part="dot">:</span>
                <span class="map-tick-rate-number" data-time-part="min-a">-</span>
                <span class="map-tick-rate-number" data-time-part="min-b">-</span>
              </span>
              <span class="map-side-phase" id="map-current-time-phase">未明</span>
            </div>
            <div id="map-tick-rate" class="map-tick-rate">
              <span class="map-tick-rate-char">流</span>
              <span class="map-tick-rate-char">转</span>
              <span class="map-tick-rate-char">间</span>
              <span class="map-tick-rate-char">隔</span>
              <span class="map-tick-rate-value" id="map-tick-rate-value">
                <span class="map-tick-rate-number" data-part="int">1</span>
                <span class="map-tick-rate-number" data-part="dot">.</span>
                <span class="map-tick-rate-number" data-part="frac-a">0</span>
                <span class="map-tick-rate-number" data-part="frac-b">0</span>
              </span>
              <span class="map-tick-rate-char">息</span>
            </div>
          </div>
        </div>
        </div>
      </section>

      <button
        id="layout-toggle-bottom"
        class="layout-collapse-toggle"
        data-layout-toggle="bottom"
        data-layout-axis="vertical"
        type="button"
        aria-label="收起下方面板"
        aria-expanded="true"
        title="收起下方面板"
      >v</button>

      <section id="layout-center-bottom" class="layout-section">
        <div class="split-tabs-shell" data-tab-group="center-merged">
          <div class="split-tabs-rail">
            <button class="split-tab-btn active" data-tab="intel" type="button">情报</button>
            <button class="split-tab-btn" data-tab="logbook" type="button">见闻录</button>
          </div>
          <div class="split-tabs-content">
            <div class="split-tab-pane active" data-pane="intel">
              <div class="merged-pane-shell" data-tab-group="center-intel">
                <div class="section-tabs">
                  <button class="tab-btn active" data-tab="map-intel" type="button">地图信息</button>
                  <button class="tab-btn" data-tab="nearby" type="button">附近动态</button>
                  <button class="tab-btn" data-tab="suggestions" type="button">行动建议</button>
                </div>
                <div class="section-body">
                  <div class="tab-pane active" id="pane-map-intel" data-pane="map-intel"></div>
                  <div class="tab-pane" id="pane-nearby" data-pane="nearby"></div>
                  <div class="tab-pane" id="pane-suggestions" data-pane="suggestions"></div>
                </div>
              </div>
            </div>

            <div class="split-tab-pane" data-pane="logbook">
              <div id="chat-panel" class="hidden">
                <div class="section-tabs chat-tabs">
                  <button class="tab-btn active" data-chat-channel="world" type="button">世界</button>
                  <button class="tab-btn" data-chat-channel="map" type="button">当前地图</button>
                  <button class="tab-btn" data-chat-channel="system" type="button">系统</button>
                  <button class="tab-btn" data-chat-channel="sect" type="button">宗门</button>
                </div>
                <div class="section-body flush chat-log-stack">
                  <div class="chat-log-panel active" data-chat-pane="world"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="map"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="system"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="sect"><div class="chat-log"></div></div>
                </div>
                <div class="chat-compose">
                  <input id="chat-input" type="text" maxlength="200" placeholder="输入聊天内容，回车发送" />
                  <button id="chat-send" class="action-btn primary-btn" style="flex:0 0 92px;">
                    <span class="btn-text">发送</span>
                    <span class="btn-border"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <aside id="layout-right" class="layout-column">
      <section class="layout-section">
        <div class="section-shell" data-tab-group="right-top">
          <div class="section-header">
            <div>
              <div class="section-title">行囊录</div>
              <div class="section-subtitle">背包、装备、功法与任务</div>
            </div>
          </div>
          <div class="section-tabs">
            <button class="tab-btn active" data-tab="inventory" type="button">背包</button>
            <button class="tab-btn" data-tab="equipment" type="button">装备</button>
            <button class="tab-btn" data-tab="technique" type="button">功法</button>
            <button class="tab-btn" data-tab="quest" type="button">任务</button>
          </div>
          <div class="section-body">
            <div class="tab-pane active" id="pane-inventory" data-pane="inventory"></div>
            <div class="tab-pane" id="pane-equipment" data-pane="equipment"></div>
            <div class="tab-pane" id="pane-technique" data-pane="technique"></div>
            <div class="tab-pane" id="pane-quest" data-pane="quest"></div>
          </div>
        </div>
      </section>

      <section class="layout-section">
        <div class="section-shell">
          <div class="section-header">
            <div>
              <div class="section-title">行动栏</div>
              <div class="section-subtitle">常驻操作与技能切换</div>
            </div>
          </div>
          <div class="section-body">
            <div id="pane-action" class="tab-pane active"></div>
          </div>
        </div>
      </section>
      <button
        id="layout-toggle-right"
        class="layout-collapse-toggle"
        data-layout-toggle="right"
        data-layout-axis="horizontal"
        type="button"
        aria-label="收起右侧区域"
        aria-expanded="true"
        title="收起右侧区域"
      >&gt;</button>
    </aside>
  </div>

  <div id="detail-modal" class="detail-modal hidden" aria-hidden="true">
    <div id="detail-modal-card" class="detail-modal-card">
      <div class="detail-modal-head">
        <div>
          <div id="detail-modal-title" class="detail-modal-title">详情</div>
          <div id="detail-modal-subtitle" class="detail-modal-subtitle"></div>
        </div>
        <div id="detail-modal-hint" class="detail-modal-hint">点击空白处关闭</div>
      </div>
      <div id="detail-modal-body"></div>
    </div>
  </div>

  <div id="observe-modal" class="observe-modal hidden" aria-hidden="true">
    <div class="observe-modal-shell">
      <div class="observe-modal-card">
        <div class="observe-modal-head">
          <div>
            <div class="observe-modal-title">观察</div>
            <div id="observe-modal-subtitle" class="observe-modal-subtitle"></div>
          </div>
          <div class="observe-modal-hint">点击空白处关闭</div>
        </div>
        <div id="observe-modal-body"></div>
      </div>
      <aside id="observe-modal-aside" class="observe-modal-aside hidden" aria-hidden="true"></aside>
    </div>
  </div>

  <div id="debug-panel" class="hidden">
    <div class="debug-panel-inner">
      <div class="debug-title">Debug</div>
      <div class="debug-text">角色丢失或跑出视野时，可直接送回云来镇出生点。</div>
      <button id="debug-reset-spawn" class="small-btn">回出生点</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
