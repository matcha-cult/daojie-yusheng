<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>道劫余生</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper-bg: #ecece8;
      --paper-light: #f5f5f1;
      --paper-white: #f8f8f5;
      --wash-ink: rgba(17, 17, 17, 0.12);
      --light-ink: #757575;
      --ink-black: #111111;
      --ink-dark: #21242a;
      --ink-grey: #555555;
      --ink-light: #b2b2b2;
      --panel-frame-border: 1.5px solid var(--ink-black);
      --stamp-red: #c53c3c;
      --stamp-red-hover: #a12b2b;
      --highlight: rgba(30, 30, 30, 0.08);
      --font-heading-main: 'Zhi Mang Xing', cursive;
      --font-heading-sub: 'Ma Shan Zheng', cursive;
      --font-body: 'Noto Serif SC', serif;
      --body-backdrop: #111111;
      --surface-base: rgba(255, 255, 255, 0.92);
      --surface-elevated: rgba(255, 255, 255, 0.78);
      --surface-card: rgba(245, 245, 241, 0.98);
      --surface-card-strong: rgba(245, 245, 241, 0.96);
      --surface-muted: rgba(255, 255, 255, 0.6);
      --surface-muted-strong: rgba(255, 255, 255, 0.72);
      --surface-muted-solid: rgba(255, 255, 255, 0.84);
      --surface-hover: rgba(255, 255, 255, 0.9);
      --surface-entry: rgba(255, 255, 255, 0.8);
      --surface-entry-alt: rgba(247, 246, 241, 0.5);
      --surface-gradient-paper: linear-gradient(180deg, rgba(249, 247, 241, 0.98), rgba(239, 235, 225, 0.97));
      --surface-gradient-entry: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(236,236,232,0.92));
      --surface-gradient-pane: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(250,248,242,0.48));
      --surface-gradient-focus: linear-gradient(180deg, rgba(255,255,255,0.66), rgba(247, 241, 229, 0.72));
      --surface-gradient-focus-passed: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(242, 233, 214, 0.7));
      --surface-gradient-world: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(0,0,0,0.04));
      --surface-gradient-tooltip: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(243, 246, 251, 0.82));
      --surface-gradient-tooltip-alt: linear-gradient(180deg, rgba(248, 245, 238, 0.98), rgba(237, 232, 223, 0.96));
      --panel-shell-bg: rgba(238, 238, 234, 0.985);
      --panel-shell-shadow: 10px 10px 0 rgba(0, 0, 0, 0.12);
      --panel-rail-bg: linear-gradient(90deg, var(--surface-muted), transparent);
      --panel-tab-bar-bg: var(--paper-bg);
      --panel-tab-text: #444444;
      --panel-tab-hover-bg: var(--highlight);
      --panel-tab-active-bg: var(--surface-muted);
      --panel-tab-active-text: var(--ink-black);
      --chat-log-bg: rgba(245, 245, 241, 0.88);
      --map-rail-bg: linear-gradient(180deg, var(--surface-muted), transparent);
      --map-rail-border: 1px solid var(--wash-ink);
      --collapse-rail-bg: rgba(248, 248, 245, 0.98);
      --collapse-rail-hover-bg: var(--surface-hover);
      --collapse-rail-text: var(--ink-dark);
      --collapse-rail-mark: rgba(110, 110, 110, 0.65);
      --input-border: rgba(17, 17, 17, 0.16);
      --input-border-strong: rgba(17, 17, 17, 0.38);
      --overlay-backdrop: rgba(12, 10, 8, 0.44);
      --success-ink: #2e6d46;
      --ghost-btn-border: rgba(34, 26, 19, 0.18);
      --ghost-btn-hover-bg: rgba(34, 26, 19, 0.08);
      --ghost-btn-active-border: rgba(128, 28, 26, 0.42);
      --ghost-btn-active-bg: rgba(128, 28, 26, 0.08);
      --ghost-btn-active-ink: var(--stamp-red);
      --auto-battle-enabled-ink: #7c2d12;
      --auto-battle-disabled-ink: var(--ink-grey);
      --observe-buff-section-border: rgba(44, 47, 51, 0.1);
      --observe-buff-section-bg: var(--surface-muted);
      --observe-buff-chip-border: rgba(44, 47, 51, 0.14);
      --observe-buff-chip-bg: var(--surface-hover);
      --observe-buff-buff-accent: rgba(69, 147, 93, 0.72);
      --observe-buff-debuff-accent: rgba(176, 68, 49, 0.72);
      --observe-buff-mark-bg: rgba(22, 17, 13, 0.88);
      --observe-buff-mark-ink: #f7efda;
      --observe-buff-stack-bg: rgba(31, 26, 20, 0.1);
      --observe-buff-stack-ink: var(--ink-black);
      --tooltip-buff-entry-bg: rgba(34, 26, 19, 0.06);
      --tooltip-buff-entry-ink: #2f241b;
      --tooltip-buff-entry-buff-bg: rgba(69, 147, 93, 0.1);
      --tooltip-buff-entry-debuff-bg: rgba(176, 68, 49, 0.1);
      --tooltip-buff-mark-bg: rgba(22, 17, 13, 0.88);
      --tooltip-buff-mark-ink: #f7efda;
      --tooltip-ink: #1a120a;
      --tooltip-muted-ink: #5c5349;
      --tooltip-head-ink: #1f1710;
      --radar-grid-stroke: rgba(34, 26, 19, 0.22);
      --radar-grid-stroke-strong: rgba(34, 26, 19, 0.3);
      --ui-font-size-hero: 52px;
      --ui-font-size-display: 38px;
      --ui-font-size-title: 22px;
      --ui-font-size-subtitle: 16px;
      --ui-font-size-body: 14px;
      --ui-font-size-caption: 12px;
      --ui-font-size-micro: 11px;
      --font-size-52: var(--ui-font-size-hero);
      --font-size-40: calc(var(--ui-font-size-display) + 2px);
      --font-size-38: var(--ui-font-size-display);
      --font-size-28: calc(var(--ui-font-size-title) + 6px);
      --font-size-24: calc(var(--ui-font-size-title) + 2px);
      --font-size-22: var(--ui-font-size-title);
      --font-size-20: calc(var(--ui-font-size-subtitle) + 4px);
      --font-size-18: calc(var(--ui-font-size-subtitle) + 2px);
      --font-size-16: var(--ui-font-size-subtitle);
      --font-size-15: calc(var(--ui-font-size-body) + 1px);
      --font-size-14: var(--ui-font-size-body);
      --font-size-13: calc(var(--ui-font-size-body) - 1px);
      --font-size-12: var(--ui-font-size-caption);
      --font-size-11: var(--ui-font-size-micro);
      --font-size-10: calc(var(--ui-font-size-micro) - 1px);
      --title-rail-size: 34px;
      --split-rail-size: 38px;
      --map-rail-size: 42px;
    }

    :root[data-color-mode="dark"] {
      --paper-bg: #181411;
      --paper-light: #211c18;
      --paper-white: #2a2420;
      --wash-ink: rgba(255, 244, 229, 0.16);
      --light-ink: #b9ab9e;
      --ink-black: #f6eee0;
      --ink-dark: #f0e5d6;
      --ink-grey: #d7c7b8;
      --ink-light: #9f9082;
      --panel-frame-border: 1.5px solid rgba(246, 238, 224, 0.82);
      --stamp-red: #d36f5c;
      --stamp-red-hover: #ea8c79;
      --highlight: rgba(255, 244, 229, 0.08);
      --body-backdrop: #090806;
      --surface-base: rgba(43, 37, 33, 0.94);
      --surface-elevated: rgba(49, 42, 37, 0.88);
      --surface-card: rgba(24, 20, 18, 0.985);
      --surface-card-strong: rgba(26, 22, 19, 0.98);
      --surface-muted: rgba(58, 49, 44, 0.8);
      --surface-muted-strong: rgba(66, 56, 50, 0.9);
      --surface-muted-solid: rgba(76, 65, 58, 0.94);
      --surface-hover: rgba(88, 75, 67, 0.98);
      --surface-entry: rgba(52, 45, 40, 0.94);
      --surface-entry-alt: rgba(39, 33, 29, 0.84);
      --surface-gradient-paper: linear-gradient(180deg, rgba(38, 32, 28, 0.98), rgba(28, 24, 21, 0.97));
      --surface-gradient-entry: linear-gradient(180deg, rgba(63, 55, 49, 0.82), rgba(37, 31, 27, 0.96));
      --surface-gradient-pane: linear-gradient(180deg, rgba(63, 54, 48, 0.72), rgba(36, 30, 27, 0.56));
      --surface-gradient-focus: linear-gradient(180deg, rgba(73, 62, 55, 0.78), rgba(45, 37, 32, 0.88));
      --surface-gradient-focus-passed: linear-gradient(180deg, rgba(67, 58, 51, 0.74), rgba(41, 34, 30, 0.84));
      --surface-gradient-world: linear-gradient(135deg, rgba(66, 57, 51, 0.72), rgba(0,0,0,0.2));
      --surface-gradient-tooltip: linear-gradient(180deg, rgba(59, 50, 45, 0.92), rgba(34, 29, 25, 0.9));
      --surface-gradient-tooltip-alt: linear-gradient(180deg, rgba(54, 46, 41, 0.96), rgba(35, 30, 27, 0.94));
      --panel-shell-bg: rgba(16, 13, 12, 0.992);
      --panel-shell-shadow: 10px 10px 0 rgba(0, 0, 0, 0.34);
      --panel-rail-bg: linear-gradient(90deg, rgba(38, 32, 28, 0.98), rgba(24, 20, 17, 0.92));
      --panel-tab-bar-bg: rgba(29, 25, 22, 0.98);
      --panel-tab-text: #e2d5c7;
      --panel-tab-hover-bg: rgba(86, 73, 65, 0.96);
      --panel-tab-active-bg: rgba(108, 91, 81, 0.98);
      --panel-tab-active-text: #fff4e6;
      --chat-log-bg: rgba(19, 16, 14, 0.985);
      --map-rail-bg: linear-gradient(180deg, rgba(20, 17, 15, 0.99), rgba(14, 12, 10, 0.97));
      --map-rail-border: 1px solid rgba(246, 238, 224, 0.16);
      --collapse-rail-bg: rgba(24, 20, 18, 0.99);
      --collapse-rail-hover-bg: rgba(82, 69, 61, 0.99);
      --collapse-rail-text: #f6eee0;
      --collapse-rail-mark: rgba(232, 219, 205, 0.72);
      --input-border: rgba(246, 238, 224, 0.16);
      --input-border-strong: rgba(246, 238, 224, 0.32);
      --overlay-backdrop: rgba(0, 0, 0, 0.62);
      --success-ink: #63ba84;
      --ghost-btn-border: rgba(246, 238, 224, 0.28);
      --ghost-btn-hover-bg: rgba(246, 238, 224, 0.12);
      --ghost-btn-active-border: rgba(234, 140, 121, 0.68);
      --ghost-btn-active-bg: rgba(211, 111, 92, 0.22);
      --ghost-btn-active-ink: #ffd6c7;
      --auto-battle-enabled-ink: #ffbf9f;
      --auto-battle-disabled-ink: #d8cbbd;
      --observe-buff-section-border: rgba(246, 238, 224, 0.18);
      --observe-buff-section-bg: rgba(90, 78, 70, 0.94);
      --observe-buff-chip-border: rgba(246, 238, 224, 0.24);
      --observe-buff-chip-bg: rgba(117, 102, 92, 0.98);
      --observe-buff-buff-accent: rgba(110, 212, 141, 0.96);
      --observe-buff-debuff-accent: rgba(255, 142, 116, 0.94);
      --observe-buff-mark-bg: rgba(246, 238, 224, 0.16);
      --observe-buff-mark-ink: #fff4e8;
      --observe-buff-stack-bg: rgba(246, 238, 224, 0.16);
      --observe-buff-stack-ink: #fff4e6;
      --tooltip-buff-entry-bg: rgba(246, 238, 224, 0.2);
      --tooltip-buff-entry-ink: #fff4e8;
      --tooltip-buff-entry-buff-bg: rgba(110, 212, 141, 0.32);
      --tooltip-buff-entry-debuff-bg: rgba(255, 142, 116, 0.32);
      --tooltip-buff-mark-bg: rgba(246, 238, 224, 0.24);
      --tooltip-buff-mark-ink: #fff8f0;
      --tooltip-ink: var(--ink-black);
      --tooltip-muted-ink: var(--ink-grey);
      --tooltip-head-ink: var(--ink-black);
      --radar-grid-stroke: rgba(246, 238, 224, 0.28);
      --radar-grid-stroke-strong: rgba(246, 238, 224, 0.38);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--body-backdrop);
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--ink-dark);
    }
    body.layout-resizing,
    body.layout-resizing * {
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    #game-canvas {
      display: block;
    }

    /* ====== 登录遮罩 ====== */
    #login-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      z-index: 100;
    }
    #login-overlay.hidden { display: none; }

    .login-box {
      background: var(--paper-light);
      border: 2px solid var(--ink-black);
      padding: 40px;
      min-width: 380px;
      max-width: 440px;
      box-shadow: 16px 16px 0px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    /* 角落装饰 */
    .login-box::before,
    .login-box::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--ink-black);
      opacity: 0.7;
      pointer-events: none;
    }
    .login-box::before {
      top: 8px; left: 8px;
      border-right: none; border-bottom: none;
    }
    .login-box::after {
      bottom: 8px; right: 8px;
      border-left: none; border-top: none;
    }

    .login-title {
      font-family: var(--font-heading-main);
      font-size: var(--font-size-52);
      text-align: center;
      color: var(--ink-black);
      margin-bottom: 6px;
      letter-spacing: 8px;
    }

    .login-logo {
      width: min(168px, 46vw);
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.12));
    }

    .login-subtitle {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-16);
      text-align: center;
      color: var(--ink-grey);
      margin-bottom: 30px;
      letter-spacing: 4px;
    }

    .login-mode-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .login-mode-tab {
      flex: 1;
      padding: 10px 0;
      border: 1.5px solid var(--ink-light);
      background: var(--surface-elevated);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-18);
      color: var(--ink-grey);
      letter-spacing: 4px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .login-mode-tab:hover {
      border-color: var(--ink-dark);
      color: var(--ink-dark);
    }

    .login-mode-tab.active {
      border-color: var(--stamp-red);
      background: rgba(197, 60, 60, 0.08);
      color: var(--ink-black);
    }

    .login-stamp {
      position: absolute;
      top: 16px;
      right: 20px;
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      color: var(--paper-bg);
      background: var(--stamp-red);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8);
      opacity: 0.85;
      transform: rotate(6deg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .form-group.hidden {
      display: none;
    }
    .form-group label {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-16);
      color: var(--ink-dark);
    }
    .form-group input {
      font-family: var(--font-body);
      font-size: var(--font-size-16);
      padding: 12px;
      border: 1.5px solid var(--ink-light);
      background: var(--surface-base);
      color: var(--ink-dark);
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--ink-black);
    }
    .form-group input::placeholder {
      color: var(--light-ink);
      font-size: var(--font-size-14);
    }
    .form-help {
      margin-top: 6px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
      line-height: 1.5;
    }
    .field-status {
      min-height: 18px;
      margin-top: 6px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .field-status.success {
      color: var(--success-ink);
    }
    .field-status.error {
      color: var(--stamp-red);
    }

    .login-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-btn {
      position: relative;
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-20);
      cursor: pointer;
      color: var(--ink-black);
      outline: none;
    }
    .btn-border {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 1px solid var(--ink-black);
      transition: all 0.2s;
      z-index: 1;
    }
    .btn-text {
      position: relative;
      z-index: 2;
      letter-spacing: 4px;
    }
    .action-btn:hover .btn-border {
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-width: 2px;
    }
    .action-btn:active .btn-border {
      background: var(--ink-black);
    }
    .action-btn:active .btn-text {
      color: var(--paper-light);
    }
    .primary-btn .btn-border {
      border: 2px solid var(--stamp-red);
    }
    .primary-btn:hover .btn-border {
      border-color: var(--stamp-red-hover);
    }
    .primary-btn:active .btn-border {
      background: var(--stamp-red);
    }

    .login-error {
      font-size: var(--font-size-14);
      color: var(--stamp-red);
      min-height: 20px;
      margin-top: 12px;
      text-align: center;
    }

    #game-shell {
      --layout-left-size: min(520px, 40vw);
      --layout-right-size: min(680px, 50vw);
      --layout-bottom-size: min(480px, 55vh);
      --layout-rail-size: 18px;
      --layout-collapsed-rail-size: var(--layout-rail-size);
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: var(--layout-left-size) minmax(0, 1fr) var(--layout-right-size);
      gap: 0;
      padding: 14px 0 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(236,236,232,0.05), rgba(17,17,17,0));
      z-index: 20;
      transition: grid-template-columns 160ms ease;
    }
    #game-shell.hidden { display: none; }
    #game-shell[data-left-collapsed="true"] {
      grid-template-columns: var(--layout-collapsed-rail-size) minmax(0, 1fr) var(--layout-right-size);
    }
    #game-shell[data-right-collapsed="true"] {
      grid-template-columns: var(--layout-left-size) minmax(0, 1fr) var(--layout-collapsed-rail-size);
    }
    #game-shell[data-left-collapsed="true"][data-right-collapsed="true"] {
      grid-template-columns: var(--layout-collapsed-rail-size) minmax(0, 1fr) var(--layout-collapsed-rail-size);
    }

    .layout-column {
      min-width: 0;
      min-height: 0;
      display: grid;
      row-gap: 0;
      column-gap: 0;
      height: 100%;
    }
    #layout-left {
      grid-template-columns: minmax(0, 1fr) var(--layout-rail-size);
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    }
    #layout-right {
      grid-template-columns: var(--layout-rail-size) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    }
    #layout-left > .layout-section {
      grid-column: 1;
    }
    #layout-right > .layout-section {
      grid-column: 2;
    }
    #layout-left > .layout-collapse-toggle {
      grid-column: 2;
      grid-row: 1 / span 2;
    }
    #layout-right > .layout-collapse-toggle {
      grid-column: 1;
      grid-row: 1 / span 2;
    }
    #layout-center {
      grid-template-rows: minmax(0, 1fr) var(--layout-rail-size) var(--layout-bottom-size);
      transition: grid-template-rows 160ms ease;
    }
    #game-shell[data-bottom-collapsed="true"] #layout-center {
      grid-template-rows: minmax(0, 1fr) var(--layout-rail-size) 0;
    }

    .layout-section {
      min-height: 0;
      min-width: 0;
      background: var(--panel-shell-bg);
      border: var(--panel-frame-border);
      box-shadow: var(--panel-shell-shadow);
      position: relative;
      overflow: hidden;
    }
    .layout-section::before,
    .layout-section::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid var(--ink-black);
      opacity: 0.4;
      pointer-events: none;
    }
    .layout-section::before {
      top: 6px;
      left: 6px;
      border-right: none;
      border-bottom: none;
    }
    .layout-section::after {
      right: 6px;
      bottom: 6px;
      border-left: none;
      border-top: none;
    }
    .layout-collapse-toggle {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border: var(--panel-frame-border);
      background: var(--collapse-rail-bg);
      color: var(--collapse-rail-text);
      font-family: var(--font-body);
      font-size: var(--font-size-11);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
    }
    .layout-collapse-toggle::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      top: 4px;
      left: 4px;
      border-top: 1px solid var(--collapse-rail-mark);

    .map-minimap {

    .map-minimap.hidden {

      height: 100%;

      font-size: var(--font-size-12);

    .map-minimap-modal.hidden {
      display: none;
    }
    .map-minimap-modal-window {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(1320px, calc(100vw - 28px));

      grid-template-rows: auto minmax(0, 1fr);

      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);

      pointer-events: auto;
      user-select: none;
      overflow: hidden;
    }
    .map-minimap-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .map-minimap-modal-title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      letter-spacing: 3px;
      color: rgba(245, 235, 216, 0.94);
    }
    .map-minimap-modal-actions {
      display: flex;
      gap: 6px;
    }
    .map-minimap-modal-catalog-toggle,
    .map-minimap-modal-close {
      min-width: 34px;
      height: 30px;
      border: 1px solid rgba(235, 220, 184, 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 235, 216, 0.9);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      cursor: pointer;
    }
    .map-minimap-modal-catalog-toggle {
      display: none;
      min-width: 52px;
      padding: 0 10px;
    }
    .map-minimap-modal-catalog-toggle.active {
      background: rgba(234, 210, 158, 0.16);
      border-color: rgba(245, 227, 185, 0.32);
      color: rgba(255, 244, 221, 0.96);
    }
    .map-minimap-modal-catalog-toggle:hover,
    .map-minimap-modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .map-minimap-modal-body {
      position: relative;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      padding: 12px;
      overflow: hidden;
    }
    .map-minimap-modal-sidebar {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
    }
    .map-minimap-modal-toolbar {
      display: flex;
      justify-content: flex-end;
    }
    .map-minimap-modal-filters {
      display: flex;
      gap: 6px;
    }
    .map-minimap-modal-filter {
      flex: 1;
      min-width: 0;
      height: 30px;
      border: 1px solid rgba(235, 220, 184, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(245, 235, 216, 0.76);
      font-family: var(--font-body);
      font-size: var(--font-size-12);
      cursor: pointer;
    }
    .map-minimap-modal-filter.active {
      background: rgba(234, 210, 158, 0.16);
      color: rgba(255, 244, 221, 0.96);
      border-color: rgba(245, 227, 185, 0.32);
    }
    .map-minimap-modal-list {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      display: grid;
      align-content: start;
      gap: 8px;
      padding-right: 2px;
    }
    .map-minimap-modal-empty {
      padding: 12px;
      border: 1px dashed rgba(245, 227, 185, 0.18);
      color: rgba(245, 235, 216, 0.62);
      font-size: var(--font-size-12);
      line-height: 1.7;
    }
    .map-minimap-modal-item {
      width: 100%;
      padding: 10px 10px 9px;
      border: 1px solid rgba(235, 220, 184, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(245, 235, 216, 0.9);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      overflow: hidden;
    }
    .map-minimap-modal-item:hover {
      border-color: rgba(245, 227, 185, 0.32);
      background: rgba(255, 255, 255, 0.06);
    }
    .map-minimap-modal-item.active {
      background: rgba(225, 193, 140, 0.12);
      border-color: rgba(245, 227, 185, 0.38);
      transform: translateX(2px);
    }
    .map-minimap-modal-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .map-minimap-modal-item-name {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      letter-spacing: 1px;
    }
    .map-minimap-modal-item-badges {
      display: inline-flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .map-minimap-modal-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      font-size: var(--font-size-11);
      line-height: 1;
      color: #0f0e0c;
    }
    .map-minimap-modal-badge.unlock {
      background: #f0d38a;
    }
    .map-minimap-modal-badge.memory {
      background: #91c5d8;
    }
    .map-minimap-modal-item-desc {
      margin-top: 6px;
      font-size: var(--font-size-11);
      line-height: 1.7;
      color: rgba(245, 235, 216, 0.62);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .map-minimap-modal-stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      overscroll-behavior: contain;
    }
    @media (max-width: 900px) {
      .map-minimap-modal-body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }
      .map-minimap-modal-sidebar {
        grid-template-rows: auto auto auto;
      }
      .map-minimap-modal-list {
        max-height: 148px;
      }
    }
    .observe-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--overlay-backdrop);
      backdrop-filter: blur(2px);
    }
    .observe-modal.hidden {
      display: none;
    }
    .observe-modal-shell {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 14px;
      width: min(1520px, 100%);
    }
    .observe-modal-card {
      flex: 1 1 auto;
      width: min(1280px, 100%);
      max-height: min(84vh, 860px);
      overflow-y: auto;
      padding: 20px 20px 18px;
      background:
        radial-gradient(circle at top right, rgba(214, 188, 142, 0.18), transparent 30%),
        var(--surface-gradient-paper);
      border: 1.5px solid var(--ink-black);
      box-shadow: 14px 14px 0 rgba(0, 0, 0, 0.16);
    }
    .observe-modal-aside {
      display: grid;
      gap: 8px;
      width: min(220px, calc(100vw - 48px));
      max-height: min(84vh, 860px);
      overflow-y: auto;
      flex: 0 0 auto;
    }
    .observe-modal-aside.hidden {
      display: none;
    }
    .observe-modal-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--wash-ink);
    }
    .observe-modal-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-22);
      color: var(--ink-black);
      letter-spacing: 2px;
    }
    .observe-modal-subtitle {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .observe-modal-hint {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .observe-modal-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .observe-modal-top .observe-modal-section + .observe-modal-section {
      margin-top: 0;
    }
    .observe-modal-section + .observe-modal-section {
      margin-top: 14px;
    }
    .observe-modal-section-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-15);
      color: var(--ink-black);
      padding-bottom: 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--wash-ink);
    }
    .observe-modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .observe-modal-row {
      padding: 9px 10px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-muted-strong);
    }
    .observe-modal-label {
      display: block;
      font-size: var(--font-size-11);
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .observe-modal-value {
      display: block;
      font-size: var(--font-size-14);
      font-weight: bold;
      color: var(--ink-black);
      word-break: break-word;
      line-height: 1.5;
    }
    .observe-entity-list {
      display: grid;
      gap: 10px;
    }
    .observe-entity-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .observe-entity-card {
      padding: 12px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-gradient-entry);
    }
    .observe-entity-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .observe-entity-name {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-15);
      color: var(--ink-black);
    }
    .observe-entity-kind {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .observe-entity-verdict {
      margin-bottom: 8px;
      font-size: var(--font-size-12);
      line-height: 1.7;
      color: var(--ink-dark);
      padding-left: 10px;
      border-left: 2px solid rgba(140, 108, 74, 0.25);
    }
    .observe-entity-empty {
      padding: 12px;
      border: 1px dashed rgba(44, 47, 51, 0.18);
      background: var(--surface-muted);
      color: var(--ink-grey);
      font-size: var(--font-size-12);
      line-height: 1.7;
    }
    .observe-buff-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .observe-buff-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--observe-buff-section-border);
      background: var(--observe-buff-section-bg);
    }
    .observe-buff-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-13);
      color: var(--ink-black);
      letter-spacing: 1px;
    }
    .observe-buff-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .observe-buff-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--observe-buff-chip-border);
      background: var(--observe-buff-chip-bg);
      text-align: left;
      color: var(--ink-black);
      cursor: help;
    }
    .observe-buff-chip.buff {
      box-shadow: inset 3px 0 0 var(--observe-buff-buff-accent);
    }
    .observe-buff-chip.debuff {
      box-shadow: inset 3px 0 0 var(--observe-buff-debuff-accent);
    }
    .observe-buff-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--observe-buff-mark-bg);
      color: var(--observe-buff-mark-ink);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      line-height: 1;
    }
    .observe-buff-name {
      font-size: var(--font-size-12);
      font-weight: bold;
      color: var(--ink-black);
      line-height: 1.2;
      white-space: nowrap;
    }
    .observe-buff-duration {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .observe-buff-stack {
      min-width: 16px;
      padding: 1px 5px;
      border-radius: 999px;
      background: var(--observe-buff-stack-bg);
      color: var(--observe-buff-stack-ink);
      font-size: var(--font-size-11);
      font-weight: bold;
      text-align: center;
    }
    @media (max-width: 820px) {
      .observe-modal-shell {
        flex-direction: column;
        align-items: stretch;
      }
      .observe-modal-card {
        width: 100%;
      }
      .observe-modal-aside {
        width: 100%;
      }
      .observe-modal-top {
        grid-template-columns: minmax(0, 1fr);
      }
      .observe-modal-grid {
        grid-template-columns: minmax(0, 1fr);
      }
      .observe-entity-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .observe-buff-columns {
        grid-template-columns: minmax(0, 1fr);
      }
    }
    @media (min-width: 821px) and (max-width: 1180px) {
      .observe-entity-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    /* ====== 滚动条 ====== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-grey); }

    /* ====== Toast ====== */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 24px;
      font-size: var(--font-size-14);
      z-index: 200;
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }
    #toast.show { opacity: 1; }
    #toast.hidden { opacity: 0; }
    #toast.toast-kind-quest { background: rgba(102, 74, 35, 0.9); }
    #toast.toast-kind-loot { background: rgba(41, 88, 54, 0.9); }
    #toast.toast-kind-combat { background: rgba(123, 38, 38, 0.92); }
    #chat-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    #chat-panel.hidden { display: none; }
    .chat-log-stack {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .chat-log-panel {
      display: none;
      height: 100%;
    }
    .chat-log-panel.active {
      display: flex;
    }
    .chat-log {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      padding: 10px 12px;
      background: var(--chat-log-bg);
      border: 1px solid var(--wash-ink);
      color: var(--ink-dark);
      font-size: var(--font-size-14);
      line-height: 1.5;
    }
    .chat-line + .chat-line {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }
    .chat-kind-quest { color: #7b4f00; }
    .chat-kind-loot { color: #1d6e42; }
    .chat-kind-combat { color: #9c2c2c; }
    .chat-compose {
      display: flex;
      gap: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--wash-ink);
    }

    .split-tabs-shell {
      display: grid;
      grid-template-columns: var(--split-rail-size) minmax(0, 1fr);
      height: 100%;
      min-height: 0;
    }
    .split-tabs-rail {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--wash-ink);
      background: var(--panel-rail-bg);
      padding: 8px 0;
    }
    .split-tab-btn {
      flex: 1 1 0;
      min-height: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--wash-ink);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      color: var(--panel-tab-text);

      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 2px;

    .split-tab-btn:last-child {
      border-bottom: none;
    }
    .split-tab-btn:hover {
      background: var(--panel-tab-hover-bg);
    }
    .split-tab-btn.active {
      color: var(--panel-tab-active-text);
      background: var(--panel-tab-active-bg);
      box-shadow: inset -2px 0 0 var(--stamp-red);
    }
    .split-tabs-content {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .split-tab-pane {
      display: none;
      height: 100%;
      min-height: 0;
    }
    .split-tab-pane.active {
      display: block;
    }
    .merged-pane-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    #chat-input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--ink-light);
      background: var(--surface-base);
      color: var(--ink-dark);
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      outline: none;
    }
    #chat-input:focus {
      border-color: var(--ink-black);
    }

    #debug-panel {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 220px;
      z-index: 56;
      pointer-events: auto;
    }
    #debug-panel.hidden { display: none; }
    .debug-panel-inner {
      background: var(--surface-card-strong);
      border: 1.5px solid var(--ink-black);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.12);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .debug-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-16);
      color: var(--ink-black);
      border-bottom: 1px solid var(--wash-ink);
      padding-bottom: 4px;
    }
    .debug-text {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
      line-height: 1.5;
    }

      font-family: var(--font-heading-sub);
      font-size: var(--font-size-16);
      color: var(--ink-black);
      border-bottom: 1px solid var(--wash-ink);
      padding-bottom: 4px;

      border-bottom: 1px solid var(--wash-ink);

      grid-template-columns: repeat(2, minmax(0, 1fr));

    }
    .intel-grid.compact {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .intel-card {
      padding: 10px;
      background: var(--surface-muted-strong);
      border: 1px solid var(--wash-ink);
    }
    .intel-label {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .intel-value {
      font-size: var(--font-size-14);
      color: var(--ink-black);
      font-weight: bold;
    }
    .attr-card {
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-muted-strong);
    }
    .attr-card-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .attr-card-sub {
      margin-top: 4px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .attr-layout {
      display: grid;
      gap: 14px;
    }
    .attr-radar-shell {
      display: grid;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-gradient-pane);
    }
    .attr-radar-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .attr-radar-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-16);
      color: var(--ink-black);
    }
    .attr-radar-scale {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .attr-radar {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      display: block;
      overflow: visible;
    }
    .attr-radar-ring {
      fill: none;
      stroke: var(--radar-grid-stroke);
      stroke-width: 1;
    }
    .attr-radar-axis {
      stroke: var(--radar-grid-stroke-strong);
      stroke-width: 1;
    }
    .attr-radar-area {
      fill: rgba(124, 37, 31, 0.14);
      stroke: rgba(124, 37, 31, 0.78);
      stroke-width: 2;
    }
    .attr-radar-node circle {
      fill: var(--stamp-red);
      stroke: rgba(255,255,255,0.9);
      stroke-width: 1.5;
    }
    .attr-radar-label {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-12);
      fill: var(--ink-black);
    }
    .attr-radar-value {
      font-size: var(--font-size-11);
      fill: var(--ink-grey);
    }
    .attr-note {
      font-size: var(--font-size-12);
      line-height: 1.55;
      color: var(--ink-grey);
    }
    .attr-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .attr-grid.wide {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .attr-mini {
      padding: 9px 10px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-muted);
    }
    .attr-mini-label {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .attr-mini-value {
      font-size: var(--font-size-15);
      font-weight: bold;
      color: var(--ink-black);
    }
    .attr-mini-sub {
      margin-top: 4px;
      font-size: var(--font-size-11);
      color: var(--ink-grey);
      line-height: 1.45;
    }

    /* 背包格子 */
    .inventory-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .inventory-filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .inventory-filter-tab {
      padding: 4px 10px;
      border: 1px solid rgba(34, 26, 19, 0.16);
      background: var(--surface-muted-strong);
      color: var(--ink-grey);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-12);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }
    .inventory-filter-tab:hover {
      border-color: rgba(34, 26, 19, 0.32);
      color: var(--ink-black);
      background: var(--surface-hover);
    }
    .inventory-filter-tab.active {
      border-color: rgba(139, 48, 35, 0.38);
      color: var(--stamp-red);
      background: rgba(139, 48, 35, 0.08);
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
      gap: 8px;
    }
    .inventory-cell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      min-height: 84px;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-gradient-entry);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      text-align: left;
      cursor: pointer;
    }
    .inventory-cell:hover {
      transform: translateY(-1px);
      border-color: rgba(0,0,0,0.15);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65), 0 8px 18px rgba(0,0,0,0.08);
    }
    .inventory-cell-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .inventory-cell-type {
      font-size: var(--font-size-10);
      line-height: 1.2;
      color: var(--ink-grey);
    }
    .inventory-cell-count {
      font-size: var(--font-size-11);
      font-weight: bold;
      color: var(--ink-black);
    }
    .inventory-cell-name {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-15);
      line-height: 1.28;
      color: var(--ink-black);
      letter-spacing: 0;
      min-height: 30px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inventory-cell-name--compact {
      font-size: var(--font-size-13);
    }
    .inventory-cell-name--tiny {
      font-size: var(--font-size-12);
    }
    .inventory-cell-actions {
      display: flex;
      width: 100%;
      min-width: 0;
      justify-content: flex-start;
      align-items: center;
      gap: 6px;
      min-height: 22px;
    }
    .inventory-cell-actions .small-btn {
      flex: 0 1 auto;
      min-width: 0;
      max-width: calc(50% - 3px);
      min-height: 22px;
      padding: 1px 6px;
      font-size: var(--font-size-11);
      white-space: nowrap;
    }
    .inventory-cell-actions .small-btn.danger {
      margin-left: auto;
    }

    .small-btn {
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--ink-black);
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-12);
      cursor: pointer;
      color: var(--ink-black);
      transition: all 0.2s;
      pointer-events: auto;
    }
    .small-btn:hover {
      background: var(--ink-black);
      color: var(--paper-light);
    }
    .small-btn.ghost {
      border-color: var(--ghost-btn-border);
      color: var(--ink-grey);
    }
    .small-btn.ghost:hover {
      background: var(--ghost-btn-hover-bg);
      color: var(--ink-black);
    }
    .small-btn.ghost.active {
      border-color: var(--ghost-btn-active-border);
      background: var(--ghost-btn-active-bg);
      color: var(--ghost-btn-active-ink);
    }
    .small-btn.danger { border-color: var(--stamp-red); color: var(--stamp-red); }
    .small-btn.danger:hover { background: var(--stamp-red); color: var(--paper-light); }
    .small-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      background: var(--highlight);
      color: var(--ink-light);
    }
    .small-btn:disabled:hover {
      background: var(--highlight);
      color: var(--ink-light);
    }

    /* 装备槽 */
    .equip-slot {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      margin-bottom: 6px;
      background: var(--paper-white);
      border: 1px solid var(--wash-ink);
    }
    .equip-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .equip-slot-name { font-family: var(--font-heading-sub); font-size: var(--font-size-14); color: var(--ink-grey); min-width: 40px; }
    .equip-slot-item { font-size: var(--font-size-13); color: var(--ink-black); }
    .equip-slot-empty { font-size: var(--font-size-13); color: var(--ink-light); font-style: italic; }
    .equip-slot-meta { font-size: var(--font-size-12); color: var(--ink-grey); }

    /* 功法卡片 */
    .tech-card {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 8px;
      background: var(--paper-white);
      border: 1px solid var(--wash-ink);
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }
    .tech-card:hover {
      border-color: rgba(139, 48, 35, 0.35);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(17, 17, 17, 0.06);
    }
    .tech-card.cultivating {
      border-color: rgba(139, 48, 35, 0.4);
      box-shadow: inset 0 0 0 1px rgba(139, 48, 35, 0.08);
    }
    .tech-card-main {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }
    .tech-summary-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .tech-name { font-family: var(--font-heading-sub); font-size: var(--font-size-15); color: var(--ink-black); }
    .tech-realm { font-size: var(--font-size-12); color: var(--stamp-red); margin-left: 6px; }
    .tech-layer {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .tech-card-actions {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }
    .tech-progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .tech-progress-text {
      font-family: var(--font-heading-sub);
      color: var(--ink-black);
    }
    .tech-progress-bar {
      position: relative;
      display: block;
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(34, 26, 19, 0.08);
    }
    .tech-progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(167, 64, 41, 0.88), rgba(214, 138, 74, 0.92));
    }
    .tech-progress-remain {
      display: block;
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .detail-modal {
      position: fixed;
      inset: 0;
      z-index: 320;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--overlay-backdrop);
      backdrop-filter: blur(2px);
    }
    .detail-modal.hidden {
      display: none;
    }
    .detail-modal-card {
      width: min(760px, 100%);
      max-height: min(80vh, 760px);
      overflow-y: auto;
      padding: 20px 20px 18px;
      background: var(--surface-card);
      border: 1.5px solid var(--ink-black);
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.12);
    }
    .detail-modal-card.detail-modal--settings {
      width: min(980px, calc(100vw - 24px));
      max-height: min(88vh, calc(100vh - 24px));
    }
    .detail-modal-card.detail-modal--quest {
      width: min(720px, calc(100vw - 32px));
      max-height: min(82vh, 820px);
      background:
        radial-gradient(circle at top right, rgba(214, 188, 142, 0.16), transparent 32%),
        var(--surface-gradient-paper);
      box-shadow: 14px 14px 0 rgba(0, 0, 0, 0.16);
    }
    .detail-modal-card.detail-modal--loot {
      width: min(860px, calc(100vw - 32px));
      max-height: min(84vh, 860px);
    }
    .detail-modal-card.detail-modal--technique {
      width: min(1120px, calc(100vw - 24px));
      max-height: min(90vh, calc(100vh - 24px));
      background:
        radial-gradient(circle at top right, rgba(124, 161, 219, 0.12), transparent 32%),
        var(--surface-gradient-paper);
      box-shadow: 14px 14px 0 rgba(0, 0, 0, 0.16);
    }
    .detail-modal.detail-modal--suggestion {
      padding: 12px;
    }
    .detail-modal-card.detail-modal--suggestion {
      width: min(1420px, calc(100vw - 24px));
      height: min(92vh, calc(100vh - 24px));
      max-height: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px 18px 16px;
      background:
        radial-gradient(circle at top right, rgba(214, 188, 142, 0.16), transparent 28%),
        var(--surface-gradient-paper);
      box-shadow: 14px 14px 0 rgba(0, 0, 0, 0.16);
    }
    .detail-modal-card.detail-modal--suggestion #detail-modal-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .chronicle-shell {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .chronicle-entry-items {
      padding-left: 20px;
      line-height: 1.8;
    }
    .chronicle-entry-items li {
      margin-bottom: 4px;
    }
    .chronicle-entry-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chronicle-entry {
      border: 1px solid var(--wash-ink);
      background: var(--surface-gradient-entry);
      padding: 14px 16px;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.06);
    }
    .chronicle-entry-head {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .chronicle-entry-time {
      font-family: var(--font-heading-sub);
      color: var(--stamp-red);
      letter-spacing: 1px;
    }
    .chronicle-entry-summary {
      font-size: var(--font-size-16);
      color: var(--ink-black);
    }
    .detail-modal-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--wash-ink);
    }
    .detail-modal-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-22);
      color: var(--ink-black);
    }
    .detail-modal-subtitle {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .detail-modal-hint {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .loot-source-section + .loot-source-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--wash-ink);
    }
    .loot-source-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .loot-source-title {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-18);
      color: var(--ink-black);
    }
    .loot-source-subtitle,
    .loot-source-desc {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
      line-height: 1.5;
    }
    .loot-search-state {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid rgba(34, 26, 19, 0.08);
      background: var(--surface-muted);
    }
    .loot-search-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .loot-search-bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(34, 26, 19, 0.08);
    }
    .loot-search-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(167, 64, 41, 0.88), rgba(214, 138, 74, 0.92));
    }
    .loot-item-grid {
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
    .loot-source-empty {
      padding: 14px 16px;
      border: 1px solid rgba(34, 26, 19, 0.08);
      background: var(--surface-muted);
      color: var(--ink-grey);
      font-size: var(--font-size-13);
    }
    .account-settings-section + .account-settings-section {
      margin-top: 14px;
    }
    .account-settings-name-grid {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .account-settings-copy {
      margin-bottom: 12px;
      font-size: var(--font-size-13);
      color: var(--ink-grey);
      line-height: 1.6;
    }
    .account-settings-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .account-settings-field label {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      color: var(--ink-dark);
    }
    .account-settings-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      background: var(--surface-base);
      color: var(--ink-black);
      font-family: var(--font-body);
      font-size: var(--font-size-15);
      outline: none;
    }
    .account-settings-field input:focus {
      border-color: var(--input-border-strong);
    }
    .account-settings-field--display {
      max-width: 180px;
    }
    .account-settings-display-input {
      width: 96px;
      padding: 10px 8px;
      text-align: center;
      font-family: var(--font-heading-main);
      font-size: var(--font-size-38);
      line-height: 1;
      letter-spacing: 0;
    }
    .account-settings-field--display .account-settings-actions {
      justify-content: flex-start;
    }
    .account-settings-status {
      min-height: 18px;
      margin-bottom: 10px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }
    .account-settings-status.success {
      color: var(--success-ink);
    }
    .account-settings-status.error {
      color: var(--stamp-red);
    }
    .account-settings-actions {
      display: flex;
      justify-content: flex-end;
    }
    .suggestion-shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      height: 100%;
      min-height: 0;
    }
    .suggestion-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .suggestion-stat {
      display: grid;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-muted);
    }
    .suggestion-stat-label {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
      letter-spacing: 0.08em;
    }
    .suggestion-stat-value {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-24);
      color: var(--ink-black);
      line-height: 1;
    }
    .suggestion-stat-note {
      font-size: var(--font-size-12);
      color: var(--ink-grey);
      line-height: 1.5;
    }
    .suggestion-layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      min-height: 0;
    }
    .suggestion-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 12px;
      border: 1px solid var(--wash-ink);
      background: var(--surface-gradient-pane);
    }
    .suggestion-pane-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 6px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--wash-ink);
    }
    .suggestion-pane-note {
      font-size: var(--font-size-11);
      color: var(--ink-grey);
    }
    .suggestion-compose-copy {
      margin-bottom: 12px;
      font-size: var(--font-size-13);
      line-height: 1.6;
      color: var(--ink-grey);
    }
    .suggestion-form-grid {
      display: grid;
      gap: 10px;
    }
    .suggestion-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .suggestion-field label {
      font-family: var(--font-heading-sub);
      font-size: var(--font-size-14);
      color: var(--ink-dark);
    }
    .suggestion-field input,
    .suggestion-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      background: var(--surface-base);
      color: var(--ink-black);
      font-family: var(--font-body);
      font-size: var(--font-size-14);
      outline: none;
      resize: none;
    }
    .suggestion-field input:focus,
    .suggestion-field textarea:focus {
      border-color: var(--input-border-strong);
    }
    .suggestion-field textarea {
      min-height: 144px;
      line-height: 1.6;
    }
    .suggestion-compose-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .suggestion-compose-actions .small-btn {
      min-width: 112px;
    }
    .suggestion-list {
      min-height: 0;
      overflow-y: auto;

    /* 行动按钮 */

      font-size: var(--font-size-12);
      cursor: pointer;
      transition: all 0.18s ease;

    .action-skill-subtab-btn:hover {
      background: var(--highlight);

    }
    .action-skill-subtab-btn.active {

      color: var(--ink-black);

    .info-list,
    .entity-list,
    .action-suggestion-list {
      display: grid;

    .info-line,
    .entity-card,

    .info-line {

      gap: 4px;
      font-size: var(--font-size-12);
      color: var(--ink-grey);
    }

    }
    .subsection-label {
      margin: 8px 0 6px;

    .entity-card {

      gap: 8px;
    }
    .entity-name,
    .suggestion-title {
      font-size: var(--font-size-13);
      color: var(--ink-black);
    }
    .entity-meta,
    .suggestion-desc {

      color: var(--ink-grey);

    .gm-inline-input,

    @media (max-width: 1180px) {
      .hud-top-row,
      .hud-resources,
      .hud-grid,
      .intel-grid,
      .world-hero {
        grid-template-columns: 1fr;
      }
      .quest-subtabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .quest-detail-grid {
        grid-template-columns: 1fr;
      }
      .section-shell {
        grid-template-columns: max(28px, calc(var(--title-rail-size) - 6px)) minmax(0, 1fr);
      }
      .split-tabs-shell {
        grid-template-columns: max(30px, calc(var(--split-rail-size) - 4px)) minmax(0, 1fr);
      }
      .map-shell {
        grid-template-columns: minmax(0, 1fr) max(56px, calc(var(--map-rail-size) - 4px));
      }
      .chat-tabs .tab-btn {
        padding: 9px 8px;
        font-size: var(--font-size-13);
      }
    }

    @media ((max-width: 920px) and (pointer: coarse)), ((max-width: 920px) and (hover: none)) {
      body {
        overflow: auto;
      }
      .layout-collapse-toggle {
        display: none;
      }
      #game-shell {
        position: relative;
        inset: auto;
        min-height: 100vh;
        padding: 14px;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      #layout-left,
      #layout-right,
      #layout-center {
        grid-template-rows: auto;
      }
      .section-shell,
      .split-tabs-shell,
      .map-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }
      .section-header {
        grid-column: 1;
        grid-row: auto;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        border-right: none;
        border-bottom: 1px solid var(--wash-ink);
        padding: 10px 14px 8px;
      }
      .section-header > div {
        flex-direction: row;
        gap: 8px;
      }
      .section-title,
      .section-subtitle,
      .hud-name,
      .hud-title,
      .split-tab-btn,
      .map-tick-rate {
        writing-mode: horizontal-tb;
        text-orientation: mixed;
      }
      .section-tabs,
      .tab-bar,
      .section-body,
      .tab-content,
      .hud-highlight,
      .hud-resources,
      .hud-grid,
        .hud-panel > .hud-row:last-child {
        grid-column: 1;
      }
      .section-tabs,
      .tab-bar,
      .section-body,
      .tab-content {
        grid-row: auto;
      }
      .split-tabs-shell,
      .map-shell {
        grid-template-rows: auto minmax(0, 1fr);
      }
      .hud-panel {
        padding: 12px;
      }
      .hud-top-row {
        flex-direction: column;
      }
      .hud-auto-column {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
      }
      .hud-grid,
      .attr-grid.wide {
        grid-template-columns: 1fr;
      }
      .tech-modal-summary {
        grid-template-columns: 1fr;
      }
      .tech-focus-grid {
        grid-template-columns: 1fr;
      }
      .detail-modal-card.detail-modal--technique {
        width: min(100vw - 16px, 1120px);
        max-height: min(94vh, calc(100vh - 16px));
        padding: 16px 14px;
      }

      .tech-focus-head {

      .tech-card-actions {

      .detail-modal-card {

        max-height: min(82vh, 760px);
        padding: 16px;
      }
      .split-tabs-rail {
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--wash-ink);
        padding: 8px;
      }
      .map-side-rail {

        justify-content: flex-start;
        align-items: center;
        gap: clamp(8px, 2.4vw, 12px);
        padding: clamp(6px, 2vw, 10px) 4px;

      }
      .map-side-rail.left {

      }
      .map-side-rail.right {
        border-left: var(--map-rail-border);

      }
      .map-minimap-modal {
