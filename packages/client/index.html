<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>道劫余生</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper-bg: #ecece8;
      --paper-light: #f5f5f1;
      --paper-white: #f8f8f5;
      --wash-ink: rgba(17, 17, 17, 0.08);
      --light-ink: #8a8a8a;
      --ink-black: #111111;
      --ink-dark: #2c2f33;
      --ink-grey: #6e6e6e;
      --ink-light: #cccccc;
      --stamp-red: #c53c3c;
      --stamp-red-hover: #a12b2b;
      --highlight: rgba(30, 30, 30, 0.08);
      --font-heading-main: 'Zhi Mang Xing', cursive;
      --font-heading-sub: 'Ma Shan Zheng', cursive;
      --font-body: 'Noto Serif SC', serif;
      --title-rail-size: 34px;
      --split-rail-size: 38px;
      --map-rail-size: 42px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--ink-dark);
    }

    #game-canvas {
      display: block;
    }

    /* ====== 登录遮罩 ====== */
    #login-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      z-index: 100;
    }
    #login-overlay.hidden { display: none; }

    .login-box {
      background: var(--paper-light);
      border: 2px solid var(--ink-black);
      padding: 40px;
      min-width: 380px;
      max-width: 440px;
      box-shadow: 16px 16px 0px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    /* 角落装饰 */
    .login-box::before,
    .login-box::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--ink-black);
      opacity: 0.7;
      pointer-events: none;
    }
    .login-box::before {
      top: 8px; left: 8px;
      border-right: none; border-bottom: none;
    }
    .login-box::after {
      bottom: 8px; right: 8px;
      border-left: none; border-top: none;
    }

    .login-title {
      font-family: var(--font-heading-main);
      font-size: 52px;
      text-align: center;
      color: var(--ink-black);
      margin-bottom: 6px;
      letter-spacing: 8px;
    }

    .login-logo {
      width: min(168px, 46vw);
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.12));
    }

    .login-subtitle {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      text-align: center;
      color: var(--ink-grey);
      margin-bottom: 30px;
      letter-spacing: 4px;
    }

    .login-stamp {
      position: absolute;
      top: 16px;
      right: 20px;
      font-family: var(--font-heading-sub);
      font-size: 14px;
      color: var(--paper-bg);
      background: var(--stamp-red);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8);
      opacity: 0.85;
      transform: rotate(6deg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      color: var(--ink-dark);
    }
    .form-group input {
      font-family: var(--font-body);
      font-size: 16px;
      padding: 12px;
      border: 1.5px solid var(--ink-light);
      background: #fff;
      color: var(--ink-dark);
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--ink-black);
    }
    .form-group input::placeholder {
      color: var(--light-ink);
      font-size: 14px;
    }

    .login-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-btn {
      position: relative;
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      font-family: var(--font-heading-sub);
      font-size: 20px;
      cursor: pointer;
      color: var(--ink-black);
      outline: none;
    }
    .btn-border {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 1px solid var(--ink-black);
      transition: all 0.2s;
      z-index: 1;
    }
    .btn-text {
      position: relative;
      z-index: 2;
      letter-spacing: 4px;
    }
    .action-btn:hover .btn-border {
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-width: 2px;
    }
    .action-btn:active .btn-border {
      background: var(--ink-black);
    }
    .action-btn:active .btn-text {
      color: var(--paper-light);
    }
    .primary-btn .btn-border {
      border: 2px solid var(--stamp-red);
    }
    .primary-btn:hover .btn-border {
      border-color: var(--stamp-red-hover);
    }
    .primary-btn:active .btn-border {
      background: var(--stamp-red);
    }

    .login-error {
      font-size: 14px;
      color: var(--stamp-red);
      min-height: 20px;
      margin-top: 12px;
      text-align: center;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr) minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(236,236,232,0.05), rgba(17,17,17,0));
      z-index: 20;
    }
    #game-shell.hidden { display: none; }

    .layout-column {
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 14px;
      height: 100%;
    }
    #layout-left,
    #layout-right {
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
    }
    #layout-center {
      grid-template-rows: minmax(0, 3fr) minmax(0, 2fr);
    }

    .layout-section {
      min-height: 0;
      min-width: 0;
      background: rgba(236, 236, 232, 0.96);
      border: 1.5px solid var(--ink-black);
      box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.12);
      position: relative;
      overflow: hidden;
    }
    .layout-section::before,
    .layout-section::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid var(--ink-black);
      opacity: 0.4;
      pointer-events: none;
    }
    .layout-section::before {
      top: 6px;
      left: 6px;
      border-right: none;
      border-bottom: none;
    }
    .layout-section::after {
      right: 6px;
      bottom: 6px;
      border-left: none;
      border-top: none;
    }

    .section-shell {
      display: grid;
      grid-template-columns: var(--title-rail-size) minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    .section-header {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 8px;
      border-right: 1px solid var(--wash-ink);
      background: linear-gradient(90deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
    }
    .section-header > div {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
    }
    .section-title {
      font-family: var(--font-heading-sub);
      font-size: 18px;
      color: var(--ink-black);
      letter-spacing: 2px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .section-subtitle {
      font-size: 11px;
      color: var(--ink-grey);
      letter-spacing: 1px;
      opacity: 0.9;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .section-tabs,
    .tab-bar {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--ink-black);
      background: var(--paper-bg);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--wash-ink);
      font-family: var(--font-heading-sub);
      font-size: 14px;
      color: var(--ink-grey);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { background: var(--highlight); }
    .tab-btn.active {
      color: var(--ink-black);
      background: rgba(255,255,255,0.38);
      box-shadow: inset 0 -2px 0 var(--stamp-red);
    }

    .section-body,
    .tab-content {
      grid-column: 2;
      grid-row: 2;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
    }
    .section-body.flush {
      padding: 0;
      overflow: hidden;
    }

    .tab-pane {
      display: none;
      height: 100%;
    }
    .tab-pane.active { display: block; }

    #hud {
      height: 100%;
    }
    #hud.hidden { display: none; }
    .hud-panel {
      display: grid;
      grid-template-columns: var(--title-rail-size) minmax(0, 1fr);
      grid-template-rows: auto auto auto minmax(0, 1fr);
      column-gap: 12px;
      row-gap: 12px;
      height: 100%;
      min-height: 0;
      padding: 14px;
    }
    .hud-top-row {
      grid-column: 2;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 12px;
    }
    .hud-identity {
      grid-column: 1;
      grid-row: 1 / 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 8px;
      border-right: 1px solid var(--wash-ink);
    }
    .hud-realm-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 3px;
      padding: 8px 12px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.45);
      min-width: 144px;
    }
    .hud-realm-label {
      font-size: 11px;
      color: var(--ink-grey);
    }
    .hud-realm-value {
      font-size: 18px;
      font-family: var(--font-heading-sub);
      color: var(--ink-black);
    }
    .hud-realm-sub {
      font-size: 12px;
      color: var(--stamp-red);
    }
    .hud-top-spacer {
      flex: 1 1 auto;
    }
    .hud-resource-bars {
      grid-column: 2;
      display: grid;
      gap: 8px;
    }
    .hud-resource-bar {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .hud-resource-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .hud-resource-meter {
      position: relative;
      height: 8px;
      border: 1px solid rgba(17, 17, 17, 0.12);
      border-radius: 999px;
      background: rgba(17, 17, 17, 0.08);
      overflow: hidden;
    }
    .hud-resource-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(207,90,64,0.9), rgba(207,90,64,0.5));
      transition: width 0.2s;
    }
    .hud-resource-meter--qi .hud-resource-fill {
      background: linear-gradient(90deg, rgba(86,124,164,0.9), rgba(86,124,164,0.5));
    }
    .hud-resource-text {
      font-size: 12px;
      font-weight: bold;
      color: var(--ink-black);
    }
    .hud-progress-shell {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hud-progress-label {
      font-size: 11px;
      color: var(--ink-grey);
    }
    .hud-progress-track {
      position: relative;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(17, 17, 17, 0.12);
      background: rgba(17, 17, 17, 0.08);
    }
    .hud-progress-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(124,37,31,0.9), rgba(207,90,64,0.7));
    }
    .hud-progress-value {
      font-size: 11px;
      color: var(--ink-black);
      text-align: right;
    }
    .hud-name {
      font-family: var(--font-heading-main);
      font-size: 28px;
      color: var(--ink-black);
      letter-spacing: 3px;
      line-height: 1;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .hud-title {
      font-family: var(--font-heading-sub);
      font-size: 13px;
      color: var(--ink-grey);
      letter-spacing: 2px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .hud-highlight {
      grid-column: 2;
      padding: 12px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.45);
    }
    .hud-topline {
      grid-column: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 10px;
    }
    .hud-highlight-label {
      font-size: 11px;
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .hud-highlight-value {
      font-family: var(--font-heading-sub);
      font-size: 22px;
      color: var(--ink-black);
    }
    .hud-resources {
      grid-column: 2;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .hud-resource-card {
      padding: 10px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.45);
    }
    .hud-resource-label {
      font-size: 11px;
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .hud-resource-value {
      font-size: 16px;
      color: var(--ink-black);
      font-weight: bold;
    }
    .hud-meter {
      height: 8px;
      margin-top: 8px;
      background: rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .hud-meter-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #c53c3c, #e49b5d);
      transition: width 0.25s ease;
    }
    .hud-bars {
      grid-column: 2;
      display: grid;
      gap: 8px;
    }
    .hud-bar-card {
      padding: 10px 12px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.45);
    }
    .hud-bar-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--ink-grey);
    }
    .hud-bar-track {
      position: relative;
      height: 18px;
      background: rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .hud-bar-fill {
      width: 0;
      height: 100%;
      transition: width 0.25s ease;
    }
    .hud-bar-fill.hp {
      background: linear-gradient(90deg, #9f2626, #d56a54);
    }
    .hud-bar-fill.qi {
      background: linear-gradient(90deg, #285b78, #67a7b8);
    }
    .hud-bar-fill.cultivation {
      background: linear-gradient(90deg, #7b5b14, #d4a447);
    }
    .hud-bar-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: var(--ink-black);
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }
    .hud-toggle-stack {
      display: grid;
      gap: 8px;
    }
    .hud-toggle-card {
      padding: 10px 12px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.42);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      text-align: left;
    }
    .hud-toggle-card:hover {
      background: rgba(255,255,255,0.6);
      border-color: rgba(0,0,0,0.12);
    }
    .hud-toggle-card.active {
      box-shadow: inset 0 -2px 0 var(--stamp-red);
      background: rgba(255,255,255,0.68);
    }
    .hud-toggle-card:active {
      transform: translateY(1px);
    }
    .hud-toggle-title {
      font-size: 11px;
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .hud-toggle-value {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      color: var(--ink-black);
    }
    .hud-grid {
      grid-column: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      flex: 1 1 auto;
      align-content: start;
    }
    .hud-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.4);
      min-width: 0;
    }
    .hud-label {
      font-family: var(--font-heading-sub);
      font-size: 13px;
      color: var(--ink-grey);
    }
    .hud-value {
      color: var(--ink-black);
      font-weight: bold;
      font-size: 14px;
      word-break: break-word;
    }
    .map-shell {
      display: grid;
      grid-template-columns: var(--map-rail-size) minmax(0, 1fr) var(--map-rail-size);
      height: 100%;
      min-height: 0;
    }
    .map-side-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 12px 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.38), rgba(255,255,255,0.08));
    }
    .map-side-rail.left {
      grid-column: 1;
      border-right: 1px solid var(--wash-ink);
    }
    .map-side-rail.right {
      grid-column: 3;
      border-left: 1px solid var(--wash-ink);
    }
    .map-zoom-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--ink-black);
      background: rgba(255,255,255,0.74);
      color: var(--ink-black);
      font-family: var(--font-heading-sub);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .map-zoom-btn:hover {
      background: var(--ink-black);
      color: var(--paper-light);
    }
    .map-zoom-value {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: var(--font-heading-sub);
      font-size: 14px;
      color: var(--ink-grey);
      line-height: 1.1;
    }
    .map-zoom-value span {
      display: block;
    }
    .map-tool-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .map-tick-rate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .map-tick-rate-char,
    .map-tick-rate-number {
      display: block;
      line-height: 1;
      text-align: center;
    }
    .map-tick-rate-char {
      font-family: var(--font-heading-main);
      font-size: 14px;
      color: var(--ink-grey);
    }
    .map-tick-rate-value {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .map-tick-rate-number {
      font-family: var(--font-heading-main);
      font-size: 22px;
      color: var(--ink-black);
    }
    #game-stage {
      grid-column: 2;
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 45%),
        linear-gradient(180deg, rgba(29, 27, 24, 0.88), rgba(15, 13, 11, 0.96));
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .map-targeting-indicator {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 3;
      padding: 6px 10px;
      border: 1px solid rgba(34, 26, 19, 0.18);
      background: rgba(248, 248, 245, 0.92);
      color: var(--ink-black);
      font-size: 12px;
      font-family: var(--font-heading-sub);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      pointer-events: none;
    }
    .map-targeting-indicator.hidden {
      display: none;
    }
    .observe-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(12, 10, 8, 0.42);
      backdrop-filter: blur(2px);
    }
    .observe-modal.hidden {
      display: none;
    }
    .observe-modal-card {
      width: min(1280px, 100%);
      max-height: min(84vh, 860px);
      overflow-y: auto;
      padding: 20px 20px 18px;
      background:
        radial-gradient(circle at top right, rgba(214, 188, 142, 0.18), transparent 30%),
        linear-gradient(180deg, rgba(249, 247, 241, 0.98), rgba(239, 235, 225, 0.97));

      color: var(--ink-grey);
    }
    .observe-modal-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);

      margin-bottom: 14px;

    .observe-modal-top .observe-modal-section + .observe-modal-section {
      margin-top: 0;
    }
    .observe-modal-section + .observe-modal-section {
      margin-top: 14px;

    .observe-modal-section-title {

      margin-bottom: 4px;
    }
    .observe-modal-value {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: var(--ink-black);

      line-height: 1.5;

    .observe-entity-list {
      display: grid;

      grid-template-columns: repeat(6, minmax(0, 1fr));

    .observe-entity-card {

      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;

      font-family: var(--font-heading-sub);
      font-size: 15px;
      color: var(--ink-black);
    }

      font-size: 11px;
      color: var(--ink-grey);
    }

      margin-bottom: 8px;
      font-size: 12px;

    /* ====== 滚动条 ====== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-grey); }

    /* ====== Toast ====== */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;

      font-size: 14px;
      z-index: 200;
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }
    #toast.show { opacity: 1; }
    #toast.hidden { opacity: 0; }
    #toast.toast-kind-quest { background: rgba(102, 74, 35, 0.9); }
    #toast.toast-kind-loot { background: rgba(41, 88, 54, 0.9); }
    #toast.toast-kind-combat { background: rgba(123, 38, 38, 0.92); }

    #chat-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    #chat-panel.hidden { display: none; }
    .chat-log-stack {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .chat-log-panel {
      display: none;
      height: 100%;
    }
    .chat-log-panel.active {
      display: flex;
    }
    .chat-log {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      padding: 10px 12px;
      background: rgba(245, 245, 241, 0.72);
      border: 1px solid var(--wash-ink);
      color: var(--ink-dark);
      font-size: 14px;
      line-height: 1.5;
    }
    .chat-line + .chat-line {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }
    .chat-kind-quest { color: #7b4f00; }
    .chat-kind-loot { color: #1d6e42; }
    .chat-kind-combat { color: #9c2c2c; }
    .chat-compose {
      display: flex;
      gap: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--wash-ink);
    }

    .split-tabs-shell {
      display: grid;
      grid-template-columns: var(--split-rail-size) minmax(0, 1fr);
      height: 100%;
      min-height: 0;
    }
    .split-tabs-rail {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--wash-ink);
      background: linear-gradient(90deg, rgba(255,255,255,0.42), rgba(255,255,255,0));
      padding: 8px 0;
    }
    .split-tab-btn {
      flex: 1 1 0;
      min-height: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--wash-ink);
      font-family: var(--font-heading-sub);
      font-size: 14px;
      color: var(--ink-grey);
      cursor: pointer;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    .split-tab-btn:last-child {
      border-bottom: none;
    }
    .split-tab-btn:hover {
      background: var(--highlight);
    }
    .split-tab-btn.active {
      color: var(--ink-black);
      background: rgba(255,255,255,0.44);
      box-shadow: inset -2px 0 0 var(--stamp-red);
    }
    .split-tabs-content {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .split-tab-pane {
      display: none;
      height: 100%;
      min-height: 0;
    }
    .split-tab-pane.active {
      display: block;
    }
    .merged-pane-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    #chat-input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--ink-light);
      background: #fff;
      color: var(--ink-dark);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus {
      border-color: var(--ink-black);
    }

    #debug-panel {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 220px;
      z-index: 56;
      pointer-events: auto;
    }
    #debug-panel.hidden { display: none; }
    .debug-panel-inner {
      background: rgba(245, 245, 241, 0.96);
      border: 1.5px solid var(--ink-black);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.12);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .debug-title {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      color: var(--ink-black);
      border-bottom: 1px solid var(--wash-ink);
      padding-bottom: 4px;
    }
    .debug-text {
      font-size: 12px;
      color: var(--ink-grey);
      line-height: 1.5;
    }

    /* 面板通用样式 */
    .panel-section { margin-bottom: 16px; }
    .panel-section-title {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      color: var(--ink-black);
      border-bottom: 1px solid var(--wash-ink);

    }

      border-bottom: 1px solid var(--wash-ink);
    }

    .panel-label { color: var(--ink-grey); }

    .intel-value {
      font-size: 14px;

    .attr-card {
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.55);
    }
    .attr-card-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .attr-card-sub {
      margin-top: 4px;
      font-size: 12px;

    }
    .attr-layout {

    }
    .attr-radar-shell {
      display: grid;
      gap: 12px;

      display: flex;

    }
    .attr-radar-title {
      font-family: var(--font-heading-sub);
      font-size: 16px;
      color: var(--ink-black);
    }
    .attr-radar-scale {
      font-size: 11px;
      color: var(--ink-grey);
    }
    .attr-radar {

      margin: 0 auto;

    }
    .attr-radar-ring {

    .attr-radar-axis {
      stroke: rgba(34, 26, 19, 0.14);

      fill: var(--stamp-red);

      stroke-width: 1.5;
    }
    .attr-radar-label {
      font-family: var(--font-heading-sub);
      font-size: 12px;

    }
    .attr-radar-value {
      font-size: 11px;
      fill: var(--ink-grey);
    }
    .attr-note {
      font-size: 12px;
      line-height: 1.55;

    .attr-grid {

    /* 背包格子 */
    .inventory-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .inventory-filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .inventory-filter-tab {
      padding: 4px 10px;
      border: 1px solid rgba(34, 26, 19, 0.16);
      background: rgba(255,255,255,0.58);
      color: var(--ink-grey);
      font-family: var(--font-heading-sub);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

      border-color: rgba(34, 26, 19, 0.32);
      color: var(--ink-black);
      background: rgba(255,255,255,0.78);

      border-color: rgba(139, 48, 35, 0.38);
      color: var(--stamp-red);
      background: rgba(139, 48, 35, 0.08);
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .inventory-cell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      min-height: 122px;
      padding: 10px;
      border: 1px solid var(--wash-ink);
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(247,244,237,0.92));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

      transform: translateY(-1px);
      border-color: rgba(0,0,0,0.15);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65), 0 8px 18px rgba(0,0,0,0.08);

    .inventory-cell-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .inventory-cell-type {
      font-size: 10px;
      line-height: 1.2;
      color: var(--ink-grey);
    }
    .inventory-cell-count {
      font-size: 12px;
      font-weight: bold;
      color: var(--ink-black);
    }
    .inventory-cell-name {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: var(--font-heading-sub);
      font-size: 18px;
      color: var(--ink-black);

      min-height: 42px;

      justify-content: space-between;
      gap: 6px;

    .small-btn {
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--ink-black);
      font-family: var(--font-heading-sub);
      font-size: 12px;
      cursor: pointer;
      color: var(--ink-black);
      transition: all 0.2s;
      pointer-events: auto;
    }
    .small-btn:hover {
      background: var(--ink-black);
      color: var(--paper-light);
    }
    .small-btn.ghost {
      border-color: rgba(34, 26, 19, 0.18);
      color: var(--ink-grey);
    }
    .small-btn.ghost:hover {
      background: rgba(34, 26, 19, 0.08);
      color: var(--ink-black);
    }
    .small-btn.danger { border-color: var(--stamp-red); color: var(--stamp-red); }
    .small-btn.danger:hover { background: var(--stamp-red); color: var(--paper-light); }

      border: 1px solid rgba(34, 26, 19, 0.14);
      background: rgba(255,255,255,0.72);
      color: var(--ink-black);
      cursor: help;
    }
    .tech-layer-empty {
      color: var(--ink-light);
      font-style: italic;
    }
    .tech-modal-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }
    .floating-tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(34,26,19,0.15);
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      font-size: 13px;
      color: #1a120a;
      z-index: 2000;
      opacity: 0;
      transition: opacity 120ms ease;
      min-width: 180px;
      max-width: min(320px, calc(100vw - 24px));
    }
    .floating-tooltip.visible {
      opacity: 1;
    }
    .floating-tooltip-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      line-height: 1.45;
    }
    .floating-tooltip-detail {
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: #5c5349;
    }
    .floating-tooltip-line {
      display: block;
    }
    .skill-tooltip-desc {
      color: #3c3228;
    }
    .skill-tooltip-label {
      color: #7a6651;
      font-weight: 600;
    }
    .skill-tooltip-note {
      color: #8a7766;
      font-size: 12px;
    }
    .skill-formula-breakdown {
      color: #5c5349;
    }
    .skill-formula-operator {
      color: #8a7766;
    }
    .skill-formula-term {
      font-weight: 700;
    }
    .skill-formula-term-base {
      color: #6b5645;
    }
    .skill-formula-term-generic {
      color: #4f5f6f;
    }
    .skill-formula-term-tech {
      color: #785820;
    }
    .skill-formula-term-phys-atk {
      color: #9b4a1a;
    }
    .skill-formula-term-spell-atk {
      color: #295da8;
    }
    .skill-formula-term-phys-def {
      color: #46515d;
    }
    .skill-formula-term-spell-def {
      color: #6043a4;
    }
    .skill-formula-term-hp {
      color: #a03f54;
    }
    .skill-formula-term-qi {
      color: #1d7762;
    }
    .skill-formula-term-speed {
      color: #9a6b00;
    }
    .skill-formula-term-resolve {
      color: #6a5747;
    }
    .skill-damage-total {
      font-size: 14px;
      font-weight: 800;
      margin-right: 2px;
    }
    .skill-damage-total-physical {
      color: #8f4317;
    }
    .skill-damage-total-spell {
      color: #2b5fae;
    }
    .skill-scaling {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 6px;
      margin-left: 2px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      vertical-align: 1px;
      white-space: nowrap;
    }
    .skill-scaling-icon {
      line-height: 1;
    }
    .skill-scaling-tech {
      background: #efe2c2;
      color: #785820;
    }
    .skill-scaling-phys-atk {
      background: #f7d8c8;
      color: #9b4a1a;
    }
    .skill-scaling-spell-atk {
      background: #d8e7ff;
      color: #295da8;
    }
    .skill-scaling-phys-def {
      background: #dce1e7;
      color: #46515d;
    }
    .skill-scaling-spell-def {
      background: #e4dcff;
      color: #6043a4;
    }
    .skill-scaling-hp {
      background: #f3d5da;
      color: #a03f54;
    }
    .skill-scaling-qi {
      background: #d4eee6;
      color: #1d7762;
    }
    .skill-scaling-speed {
      background: #f9e8b8;
      color: #9a6b00;
    }
    .skill-scaling-resolve {
      background: #e6ddd5;
      color: #6a5747;
    }

    /* 任务卡片 */
    .quest-card {
      padding: 10px;
      margin-bottom: 8px;
      background: var(--paper-white);
      border: 1px solid var(--wash-ink);
    }
    .quest-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .quest-title {
      font-family: var(--font-heading-sub);
      font-size: 15px;
      color: var(--ink-black);
    }
    .quest-status {
      font-size: 11px;
      padding: 1px 6px;
      border: 1px solid var(--ink-black);
      background: var(--paper-bg);
    }
    .status-available { color: #365b7c; border-color: #365b7c; }
    .status-active { color: #8b5e00; border-color: #8b5e00; }
    .status-ready { color: #0d7a38; border-color: #0d7a38; }
    .status-completed { color: #666; border-color: #666; }
    .quest-desc {
      font-size: 12px;
      color: var(--ink-grey);
      margin-bottom: 4px;
    }
    .quest-progress-label {
      font-size: 12px;
      color: var(--ink-black);
      margin-bottom: 4px;
    }
    .quest-progress-bar {
      height: 6px;
      background: var(--wash-ink);
      margin-bottom: 6px;
    }
    .quest-progress-fill {
      height: 100%;
      background: var(--stamp-red);
      transition: width 0.3s;
    }
    .quest-meta {
      font-size: 11px;
      color: var(--ink-grey);
      margin-top: 2px;
    }

    /* 行动按钮 */
    .action-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      margin-bottom: 6px;
      background: var(--paper-white);
      border: 1px solid var(--wash-ink);
    }
    .action-item.cooldown {
      opacity: 0.7;
    }
    .action-copy {
      flex: 1;
      min-width: 0;
    }
    .action-copy-tooltip {
      cursor: help;
    }
    .action-name { font-size: 13px; color: var(--ink-black); }
    .action-type { font-size: 11px; color: var(--ink-grey); }
    .action-shortcut-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      border: 1px solid rgba(34, 26, 19, 0.14);
      background: rgba(255,255,255,0.72);
      font-size: 10px;
      color: var(--stamp-red);
      vertical-align: middle;
    }
    .action-desc {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink-grey);
    }
    .action-cta {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .action-cd { font-size: 12px; color: var(--stamp-red); }
    .action-tab-bar {
      display: flex;
      gap: 0;
      border: 1px solid var(--wash-ink);
      margin-bottom: 12px;
      background: rgba(255,255,255,0.36);
    }
    .action-tab-btn {
      flex: 1 1 0;
      min-width: 0;
      padding: 8px 10px;
      border: none;
      border-right: 1px solid var(--wash-ink);
      background: transparent;
      color: var(--ink-grey);
      font-family: var(--font-heading-sub);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-tab-btn:last-child {
      border-right: none;
    }
    .action-tab-btn:hover {
      background: var(--highlight);
    }
    .action-tab-btn.active {
      color: var(--ink-black);
      background: rgba(255,255,255,0.55);
      box-shadow: inset 0 -2px 0 var(--stamp-red);
    }
    .action-tab-pane {
      display: none;
    }
    .action-tab-pane.active {
      display: block;
    }

    .world-hero {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 10px;
      padding: 12px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(0,0,0,0.04));
      border: 1px solid var(--wash-ink);
    }
    .world-hero.compact {
      padding: 10px;
      margin-bottom: 12px;
    }
    .world-kicker {
      font-size: 11px;
      color: var(--ink-grey);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .world-title {
      margin: 4px 0 8px;
      font-family: var(--font-heading-sub);
      font-size: 24px;
      color: var(--ink-black);
    }
    .world-desc {
      font-size: 12px;
      line-height: 1.55;
      color: var(--ink-grey);
    }
    .world-danger {
      padding: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.5);
    }
    .world-danger-label {
      font-size: 11px;
      color: var(--ink-grey);
      margin-bottom: 6px;
    }
    .world-danger-value {
      font-family: var(--font-heading-sub);
      font-size: 20px;
      color: var(--ink-black);
    }
    .world-danger-sub {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink-grey);
    }
    .danger-5,
    .danger-4 { color: #9c2c2c; }
    .danger-3 { color: #8b5e00; }
    .danger-2 { color: #4b6a1d; }
    .danger-1 { color: #365b7c; }
    .info-list,
    .entity-list,
    .action-suggestion-list {
      display: grid;
      gap: 8px;
    }
    .info-line,
    .entity-card,
    .suggestion-card {
      padding: 8px 10px;
      border: 1px solid var(--wash-ink);
      background: rgba(255,255,255,0.5);
    }
    .info-line {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--ink-grey);
    }
    .info-line strong {
      color: var(--ink-black);
      font-weight: bold;
    }
    .subsection-label {
      margin: 8px 0 6px;
      font-size: 12px;
      color: var(--ink-grey);
    }
    .entity-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .entity-name,
    .suggestion-title {
      font-size: 13px;
      color: var(--ink-black);
    }
    .entity-meta,
    .suggestion-desc {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink-grey);
    }
    .entity-hp {
      font-size: 12px;
      color: var(--stamp-red);
    }

    .empty-hint {
      text-align: center;
      color: var(--ink-light);
      font-size: 13px;
      padding: 20px 0;
    }
    .empty-hint.compact {
      font-size: 12px;
      padding: 10px 0;
    }

    .gm-btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .gm-inline-input,
    .gm-field input,
    .gm-field select {
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid var(--ink-light);
      background: #fff;
      color: var(--ink-dark);
      font-family: var(--font-body);
      font-size: 13px;
    }
    .gm-inline-input {
      width: 72px;
    }
    .gm-player-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 280px;
      overflow-y: auto;
    }
    .gm-player-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--wash-ink);
      background: var(--paper-white);
      text-align: left;
      cursor: pointer;
      color: var(--ink-dark);
    }
    .gm-player-row.active {
      border-color: var(--stamp-red);
      background: rgba(197, 60, 60, 0.06);
    }
    .gm-player-name {
      font-family: var(--font-heading-sub);
      font-size: 14px;
      color: var(--ink-black);
    }
    .gm-player-meta,
    .gm-player-stat {
      font-size: 12px;
      color: var(--ink-grey);
    }
    .action-card-side {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .gm-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .gm-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--ink-grey);
    }
    .gm-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--ink-dark);
    }

    @media (max-width: 1180px) {
      .hud-top-row,
      .hud-resources,
      .hud-grid,
      .intel-grid,
      .world-hero {
        grid-template-columns: 1fr;
      }
      .section-shell {
        grid-template-columns: max(28px, calc(var(--title-rail-size) - 6px)) minmax(0, 1fr);
      }
      .split-tabs-shell {
        grid-template-columns: max(30px, calc(var(--split-rail-size) - 4px)) minmax(0, 1fr);
      }
      .map-shell {
        grid-template-columns: minmax(0, 1fr) max(56px, calc(var(--map-rail-size) - 4px));
      }
      .chat-tabs .tab-btn {
        padding: 9px 8px;
        font-size: 13px;
      }
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }
      #game-shell {
        position: relative;
        inset: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      #layout-left,
      #layout-right,
      #layout-center {
        grid-template-rows: auto;
      }
      .section-shell,
      .split-tabs-shell,
      .map-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }
      .section-header {
        grid-column: 1;
        grid-row: auto;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        border-right: none;
        border-bottom: 1px solid var(--wash-ink);
        padding: 10px 14px 8px;
      }
      .section-header > div {
        flex-direction: row;
        gap: 8px;
      }
      .section-title,
      .section-subtitle,
      .hud-name,
      .hud-title,
      .split-tab-btn,
      .map-tick-rate {
        writing-mode: horizontal-tb;
        text-orientation: mixed;
      }
      .section-tabs,
      .tab-bar,
      .section-body,
      .tab-content,
      .hud-highlight,
      .hud-resources,
      .hud-grid,
        .hud-panel > .hud-row:last-child {
        grid-column: 1;
      }
      .section-tabs,
      .tab-bar,
      .section-body,
      .tab-content {
        grid-row: auto;
      }
      .split-tabs-shell,
      .map-shell {
        grid-template-rows: auto minmax(0, 1fr);
      }
      .hud-panel {
        padding: 12px;
      }
      .hud-top-row {
        flex-direction: column;
      }
      .hud-auto-column {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
      }
      .hud-grid,
      .attr-grid.wide {
        grid-template-columns: 1fr;
      }
      .tech-modal-summary {
        grid-template-columns: 1fr;
      }
      .tech-modal-card {
        width: min(100%, calc(100vw - 24px));
        max-height: min(82vh, 760px);
        padding: 16px;
      }
      .split-tabs-rail {
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--wash-ink);
        padding: 8px;
      }
      .map-side-rail {
        flex-direction: row;
        justify-content: space-between;
        border: none;
        border-bottom: 1px solid var(--wash-ink);
        padding: 8px 12px;
      }
      .map-side-rail.right {
        border-top: 1px solid var(--wash-ink);
        border-bottom: none;
      }
      .map-tool-controls {
        flex-direction: row;
      }
      .split-tab-btn {
        border-bottom: none;
        border-right: 1px solid var(--wash-ink);
        padding: 8px 12px;
      }
      .split-tab-btn:last-child {
        border-right: none;
      }
      .split-tab-btn.active {
        box-shadow: inset 0 -2px 0 var(--stamp-red);
      }
      #layout-center {
        order: 1;
      }
      #layout-left {
        order: 2;
      }
      #layout-right {
        order: 3;
      }
      .layout-section {
        min-height: 260px;
      }
      .map-section {
        min-height: 420px;
      }
      #debug-panel {
        right: 10px;
        bottom: 10px;
        width: min(260px, calc(100vw - 20px));
      }
    }
  </style>
</head>
<body>
  <!-- 登录 -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-stamp">入</div>
      <img class="login-logo" src="/logo.png" alt="道劫余生" />
      <h1 class="login-title">道劫余生</h1>
      <p class="login-subtitle">道劫余生</p>
      <div class="form-group">
        <label>道号</label>
        <input id="input-username" type="text" placeholder="输入用户名" />
      </div>
      <div class="form-group">
        <label>口令</label>
        <input id="input-password" type="password" placeholder="输入密码" />
      </div>
      <div class="login-actions">
        <button class="action-btn primary-btn" id="btn-login">
          <span class="btn-text">登录</span>
          <span class="btn-border"></span>
        </button>
        <button class="action-btn" id="btn-register">
          <span class="btn-text">注册</span>
          <span class="btn-border"></span>
        </button>
      </div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <div id="game-shell" class="hidden">
    <aside id="layout-left" class="layout-column">
      <section class="layout-section">
        <div id="hud" class="hidden">
          <div class="hud-panel">
            <div class="hud-identity">
              <div class="hud-name" id="hud-name">修行者</div>
              <div class="hud-title" id="hud-title">无号散修</div>
            </div>
            <div class="hud-top-row">
              <div class="hud-realm-block">
                <div class="hud-realm-label">境界</div>
                <div class="hud-realm-value" id="hud-realm">-</div>
                <div class="hud-realm-sub" id="hud-realm-sub">-</div>
              </div>
              <div class="hud-top-spacer"></div>
            </div>
            <div class="hud-resource-bars">
              <div class="hud-resource-bar">
                <div class="hud-resource-head">
                  <div class="hud-resource-label">生命值</div>
                  <div class="hud-resource-text" id="hud-hp-text">0/0</div>
                </div>
                <div class="hud-resource-meter">
                  <div class="hud-resource-fill" id="hud-hp-bar"></div>
                </div>
              </div>
              <div class="hud-resource-bar">
                <div class="hud-resource-head">
                  <div class="hud-resource-label">灵力</div>
                  <div class="hud-resource-text" id="hud-qi-text">0/0</div>
                </div>
                <div class="hud-resource-meter hud-resource-meter--qi">
                  <div class="hud-resource-fill" id="hud-qi-bar"></div>
                </div>
              </div>
            </div>
            <div class="hud-progress-shell">
              <div class="hud-resource-head">
                <div class="hud-progress-label">修为进度</div>
                <div class="hud-progress-value" id="hud-cultivate">-</div>
              </div>
              <div class="hud-progress-track">
                <div class="hud-progress-fill" id="hud-cultivate-bar"></div>
              </div>
            </div>
            <div class="hud-grid">
              <div class="hud-row">
                <span class="hud-label">地图</span>
                <span class="hud-value" id="hud-map">-</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">位置</span>
                <span class="hud-value" id="hud-pos">(0, 0)</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">当前目标</span>
                <span class="hud-value" id="hud-objective">暂无</span>
              </div>
              <div class="hud-row">
                <span class="hud-label">威胁</span>
                <span class="hud-value" id="hud-threat">平稳</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="layout-section">
        <div class="section-shell" data-tab-group="left-lower">
          <div class="section-header">
            <div>
              <div class="section-title">修行卷</div>
              <div class="section-subtitle">属性总览</div>
            </div>
          </div>
          <div class="section-body">
            <div class="tab-pane active" id="pane-attr"></div>
          </div>
        </div>
      </section>
    </aside>

    <main id="layout-center" class="layout-column">
      <section class="layout-section map-section">
        <div class="map-shell">
          <div class="map-side-rail left">
            <div class="map-tool-controls">
              <button id="zoom-in" class="map-zoom-btn" type="button">+</button>
              <div id="zoom-level" class="map-zoom-value"><span>x</span><span>1</span></div>
              <button id="zoom-out" class="map-zoom-btn" type="button">-</button>
            </div>
          </div>
          <div id="game-stage">
            <div id="map-targeting-indicator" class="map-targeting-indicator hidden"></div>
            <canvas id="game-canvas"></canvas>
          </div>
        <div class="map-side-rail right">
          <div id="map-tick-rate" class="map-tick-rate">
            <span class="map-tick-rate-char">流</span>
            <span class="map-tick-rate-char">转</span>
            <span class="map-tick-rate-char">间</span>
            <span class="map-tick-rate-char">隔</span>
            <span class="map-tick-rate-value" id="map-tick-rate-value">
              <span class="map-tick-rate-number" data-part="int">1</span>
              <span class="map-tick-rate-number" data-part="dot">.</span>
              <span class="map-tick-rate-number" data-part="frac-a">0</span>
              <span class="map-tick-rate-number" data-part="frac-b">0</span>
            </span>
            <span class="map-tick-rate-char">息</span>
          </div>
        </div>
        </div>
      </section>

      <section class="layout-section">
        <div class="split-tabs-shell" data-tab-group="center-merged">
          <div class="split-tabs-rail">
            <button class="split-tab-btn active" data-tab="intel" type="button">情报</button>
            <button class="split-tab-btn" data-tab="logbook" type="button">见闻录</button>
          </div>
          <div class="split-tabs-content">
            <div class="split-tab-pane active" data-pane="intel">
              <div class="merged-pane-shell" data-tab-group="center-intel">
                <div class="section-tabs">
                  <button class="tab-btn active" data-tab="map-intel" type="button">地图信息</button>
                  <button class="tab-btn" data-tab="nearby" type="button">附近动态</button>
                  <button class="tab-btn" data-tab="suggestions" type="button">行动建议</button>
                </div>
                <div class="section-body">
                  <div class="tab-pane active" id="pane-map-intel" data-pane="map-intel"></div>
                  <div class="tab-pane" id="pane-nearby" data-pane="nearby"></div>
                  <div class="tab-pane" id="pane-suggestions" data-pane="suggestions"></div>
                </div>
              </div>
            </div>

            <div class="split-tab-pane" data-pane="logbook">
              <div id="chat-panel" class="hidden">
                <div class="section-tabs chat-tabs">
                  <button class="tab-btn active" data-chat-channel="world" type="button">世界</button>
                  <button class="tab-btn" data-chat-channel="map" type="button">当前地图</button>
                  <button class="tab-btn" data-chat-channel="system" type="button">系统</button>
                  <button class="tab-btn" data-chat-channel="sect" type="button">宗门</button>
                </div>
                <div class="section-body flush chat-log-stack">
                  <div class="chat-log-panel active" data-chat-pane="world"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="map"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="system"><div class="chat-log"></div></div>
                  <div class="chat-log-panel" data-chat-pane="sect"><div class="chat-log"></div></div>
                </div>
                <div class="chat-compose">
                  <input id="chat-input" type="text" maxlength="200" placeholder="输入聊天内容，回车发送" />
                  <button id="chat-send" class="action-btn primary-btn" style="flex:0 0 92px;">
                    <span class="btn-text">发送</span>
                    <span class="btn-border"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <aside id="layout-right" class="layout-column">
      <section class="layout-section">
        <div class="section-shell" data-tab-group="right-top">
          <div class="section-header">
            <div>
              <div class="section-title">行囊录</div>
              <div class="section-subtitle">背包、装备、功法与 GM</div>
            </div>
          </div>
          <div class="section-tabs">
            <button class="tab-btn active" data-tab="inventory" type="button">背包</button>
            <button class="tab-btn" data-tab="equipment" type="button">装备</button>
            <button class="tab-btn" data-tab="technique" type="button">功法</button>
            <button class="tab-btn" data-tab="quest" type="button">任务</button>
            <button class="tab-btn" data-tab="gm" type="button">GM</button>
          </div>
          <div class="section-body">
            <div class="tab-pane active" id="pane-inventory" data-pane="inventory"></div>
            <div class="tab-pane" id="pane-equipment" data-pane="equipment"></div>
            <div class="tab-pane" id="pane-technique" data-pane="technique"></div>
            <div class="tab-pane" id="pane-quest" data-pane="quest"></div>
            <div class="tab-pane" id="pane-gm" data-pane="gm"></div>
          </div>
        </div>
      </section>

      <section class="layout-section">
        <div class="section-shell">
          <div class="section-header">
            <div>
              <div class="section-title">行动栏</div>
              <div class="section-subtitle">常驻操作与技能切换</div>
            </div>
          </div>
          <div class="section-body">
            <div id="pane-action" class="tab-pane active"></div>
          </div>
        </div>
      </section>
    </aside>
  </div>

  <div id="technique-modal" class="tech-modal hidden" aria-hidden="true">
    <div class="tech-modal-card">
      <div class="tech-modal-head">
        <div>
          <div id="technique-modal-title" class="tech-modal-title">功法</div>
          <div id="technique-modal-subtitle" class="tech-modal-subtitle"></div>
        </div>
        <div class="tech-modal-hint">点击空白处关闭</div>
      </div>
      <div id="technique-modal-body"></div>
    </div>
  </div>

  <div id="observe-modal" class="observe-modal hidden" aria-hidden="true">
    <div class="observe-modal-card">
      <div class="observe-modal-head">
        <div>
          <div class="observe-modal-title">观察</div>
          <div id="observe-modal-subtitle" class="observe-modal-subtitle"></div>
        </div>
        <div class="observe-modal-hint">点击空白处关闭</div>
      </div>
      <div id="observe-modal-body"></div>
    </div>
  </div>

  <div id="debug-panel" class="hidden">
    <div class="debug-panel-inner">
      <div class="debug-title">Debug</div>
      <div class="debug-text">角色丢失或跑出视野时，可直接送回云来镇出生点。</div>
      <button id="debug-reset-spawn" class="small-btn">回出生点</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
