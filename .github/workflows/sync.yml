name: Sync To Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push main branch to Gitee
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          GITEE_OWNER="${GITEE_OWNER:-YuoHira}"
          cat <<EOF > ~/.netrc
          machine gitee.com
            login ${GITEE_OWNER}
            password ${GITEE_TOKEN}
          EOF
          chmod 600 ~/.netrc
          git remote add gitee "https://gitee.com/${GITEE_OWNER}/${GITHUB_REPOSITORY#*/}.git"
          git push --force gitee main:main
