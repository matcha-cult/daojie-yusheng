services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mud
      POSTGRES_PASSWORD: mud_secret
      POSTGRES_DB: daojie_yusheng
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mud -d daojie_yusheng"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      JWT_SECRET: daojie-yusheng-production-secret
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: mud
      DB_PASSWORD: mud_secret
      DB_DATABASE: daojie_yusheng
      DATABASE_URL: postgres://mud:mud_secret@postgres:5432/daojie_yusheng
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
